    {
      "data": {
        "id": "Section_a6865ed6725cafd2",

        "key": "Introduction",
        "heading": "Introduction",
        "body": "The book you hold in your hands, or on your screen, is the result of a research on how teams all over the world specify, develop and deliver the right software, without defects, in very short cycles. It presents the collective knowledge of about fifty projects, ranging from public web sites to internal back-office systems. These projects involved teams as diverse as small colocated teams and groups spread across different continents, working in a range of processes including Extreme Programming, Scrum, Kanban and similar methods often bundled together under the names Agile and Lean. They have one thing in common - they got the practices of collaborating on specifications and tests right and got big benefits out of that. I present this topic through case studies and interviews. The main reason is so that You, my dear reader, can see that there are real teams out there right now, doing this and getting big benefits out of that. Specification by Example is not a dark art. You don't have to be a high priest of the Church of Scientology or a Freemason to imple-ment it, although the media might make you think that. In June 2009, InfoQ published an article suggesting that the ideas of Specification by Example are purely theoretical. Sure enough, the adoption of these practices is less than stellar, as Amr Elssamadisy suggested in that article. He also wrote that \"this type of testing hasn't really caught on\". Those eight words summarize everything that I think is wrong about the ignorant attitude towards these practices in the community. First, this is not about testing . To be entirely correct, it is a bit about testing, but it has a lot more to do with other things. When my talk on specification workshops was put on the testing track at the Oredev 2009 conference, I joked that it would be the same as if it was put on the mobile development track. It is as relevant for mobile games development as it is for testing, in the sense that both benefit from good communic-ation and precise specifications. Many people misunderstand this completely, and this book will hopefully start changing that. Second, the people in our industry take too much liberty in generalizing their experi-ences and views of the world. Far too often we use phrases such as the real world to mean my little cubicle and dismiss the changes that are out there, happening right now. I saw the perfect example of that at the Next Generation Testing conference in May 2010 in London. Someone from Norwich and Peterborough Building Society presented an experience report on how her team utterly failed to adopt agile by doing it completely wrong. The only conclusion I got out of it is that agile development done badly produces equally bad results as any other wrongly implemented process. She, on the other hand, contrasted the experience with the ideas from the excellent Agile Testing book by Lisa Crispin and Janet Gregory referring to them as a \"pie in the sky\", followed by loud approvals from the audience. I had a ton of similar experiences with my previous book, Bridging the Communication Gap . In it, I consolidated ideas from several projects and wrote about my experiences of implementing Specification by Example. At the majority of conferences I attended, there was always someone dismissing that as blue-sky thinking, typically starting the statement with something such as 'but in the real world'. As if I spent years just imagining things and the teams I worked with were from fairy-tale stories. Almost everything in this book is from the real world, real teams and real experiences. A very small number of practices are presented as suggestions without being backed by a case study. Those are ideas that I thought will be important for the future, and they are clearly introduced as such. I am certain that the research leading to this book and my conclusions will be dismissed for not being a serious scientific study by those skeptics who claim that agile develop-ment does not work and that the industry should go back to 'real software engineer-ing'. That is fine. The resources available to me for this are minute compared to what would be required for a serious scientific research. Even with those resources, I am not a serious scientist, nor do I intend to present myself as such. I am a practitioner. If you are a lab rat or a theoretical software engineer, who has not touched a piece of code or worked in delivering real software in the last two decades, there is very little this book can do for you. It will show you that there are teams out there who do this for real and get benefits out of it, but you can still choose not to believe it because I don't have hard scientific results. That is entirely up to you. At the end of the day, the problems I'm interested in do not even come up in academic software research, so we can continue to ignore each-other safely. If you are a practitioner, like me, and your bread and butter comes from making or helping software go live, this book has a lot to offer. I primarily wrote it for teams that have tried to implement an agile process and ran into problems which manifest themselves as poor quality, rework and missed customer expectations. (Yes, these are problems, and plainly iterating is a workaround and not a solution.) Specification by Example, agile acceptance testing, behavior driven development, and all the other alternative names for the same thing, solve these problems. This book will help you get started with those practices and learn how to contribute better to your team, regardless of whether you qualify yourself as a tester, developer, analyst or product owner. A few years ago, most people I met at conferences had not heard of these ideas. Most people I meet now are somewhat aware of these practices, but many failed to implement them properly. There is very little literature on problems that teams face while implementing agile development in general, so every discouraged team thinks that they are unique and that somehow the ideas don't work in their 'real world'. They seem surprised how I could guess three or four of their biggest problems after just five minutes of listening to them. They are often completely astonished that there are many other teams out there that have the same issues. If you work in such a team, the first thing that this book will do for you is show you that you are not alone. The teams I interviewed for this book are not perfect - they had a ton of issues as well. Instead of quitting after they hit a brick wall, they decided to drive around it or tear it down. Knowing this is often encouraging enough for people to look at their problems in a different light. I hope that after reading the book you will feel the same. If you are in the process of implementing Specification by Example, this book will provide useful advice on how to get past your current problems and learn what you can expect in the future. You will hopefully learn from the mistakes of others and avoid hitting some problems at all. This book is also written for experienced practitioners, people with a relatively successful implementation of Specification by Example in their process. I started the research expecting that I know most of what is out there, looking for external confirmation. I ended it surprised by how many different ideas people implemented in their contexts, things I never thought about. I learned a lot from these examples and hopefully so will you. The practices and the ideas described here should inspire you to try alternative solutions to your problems or realize how you can improve the process of your team once you read similar stories. Instead of convincing you why you should follow the principles outlined in the book, in the true specification by example style I offer examples of benefits that teams got from this process. If you are thinking whether or not to buy this book, skim over Chapter 1 and see if any of the benefits presented there would apply to your project. In Chapter 2 I introduce the principles and the overall process of Specification by Example. One of my goals with this book is to create a consistent language for patterns, ideas and artifacts that teams use to implement Specification by Example. The community has a dozen names for the practice as a whole, and twice that much for various elements of it. Different people call the same thing feature files, story tests, BDD files, acceptance tests and so on. For that reason, I also introduce what I think are very good names for all the key elements in this chapter. Even if you are an experienced practitioner, I suggest you read this chapter to make sure that we have the same understanding of the key names, phrases and patterns in this book. When I quote someone using different names for those concepts, I put the names from this chapter in square brackets. In Chapter 3 I present the most common starting points for initiating the changes to process and team culture and advice on what to watch out for when you start imple-menting the process. I present the key practices that the teams from my research used to implement the principles of Specification by Example in Part II. Teams in different contexts do very different things, sometimes even opposing or conflicting, to get to the same effect. In addition to the practices, I document the contexts in which the teams use them to implement the underlying principles. The chapters in this Part II are roughly broken down by process areas. Software development is not static - teams and environments change and the process must follow. I present case studies showing the journey of a few selected teams to this date in Part III. I write about their processes, constraints and contexts, analyzing how the processes evolved. The stories from this part will help you get started with the journey or take the next step, find ideas and discover new ways of doing things. On the traditional 'Shu-ha-ri' learning model, this book is at the 'Ha' level. 'Ha' is about breaking the old rules and showing that there are many successful models. In Bridging the Communication Gap, I presented my model and my experience. In this book, I try very hard not to be influenced by my background. I present things from my projects only when there is an important point to make and I do not think that any of the teams featured in the book had a similar case, which is very rare. So in that sense, Specification by Example continues where Bridging the Communication Gap stopped. I will introduce the basic principles very briefly in Chapter 2. Even if you've never heard of any of these ideas before, this should give you enough information to understand the rest of the book, but I won't go into the basics too much. I wrote about the basics of Specification by Example at length in Bridging the Communication Gap and have no wish to repeat myself. Visit http://specificationbyexample.com, register a copy of this book and you will get the PDF of Bridging the Communication Gap for free if you want to go over the basics in more detail. I do not think that I will write a follow-up to this subject on the Ri level - because that is a level beyond books. On the other hand, I believe that this book will help you move to that level. Once you start thinking that the choice of a particular tool is irrelevant - you are there. This book has no source code or instructions on how to work with a particular tool. I feel compelled to mention this upfront, because I had to explain it already several times during the publishing process (typically as an answer to an amazed question 'What do you mean? A software development book without source code? How's that possible?') The principles and practices of Specification by Example primarily affect how people communicate in software delivery teams and how they collaborate with business users and stakeholders. I'm sure that there are many tool vendors out there who will try to sell you a technical solution for that. There are also many managers out there would be happier to pay for the problem to go away instantly. Unfortunately for them, this is really a people problem, not a technical one. Once you get the communication and collaboration right, a tool might help to make it go smoother. Starting with a tool, on the other hand, is guaranteed to take longer and cost more (see section Avoid this (VIP): Focusing on a tool on page 42).",

    {
      "data": {
        "id": "Section_f87b9422299b0b7f",

        "key": "Chapter 1",
        "heading": "Key Benefits",
        "body": "In this age of Internet, delivery speed seems to be the theme of the day in software development. A decade ago, projects lasted several years and project phases were measured in months. Today, most teams I work with deal with projects measured in months and project phases which are time-boxed to weeks or even days. Everything that smelled of long term planning simply got dropped in a realization that the future is unpredictable. Big up front software designs, detailed requirements analysis and anything else that required more time than an average project phase, were no longer viable. Good-bye code freezes and weeks of manual regression testing! With such a high frequency of change, documentation quickly became outdated. Detailed specifications, documentation and test plans required too much effort to keep current. They were just labeled as waste. These artifacts are collateral damage, casualties of the change to a model with fast and frequent deliveries. People who relied on them for their day-to-day work, such as business analysts or testers, often got very confused about what to do in this new world of weekly iterations. Software developers thought that they weren't affected that badly with the lack of paper documents, but this had a rippling effect on their work as well. Instead of the wastes of preparing documentation that nobody will ever read, we got the wastes of rework and just-in-case-code. Spending weeks iterating to polish the wrong product is as wasteful as was spending the same time building big plans. In the last decade, the software development community was mostly focused on building the software the right way -- on the technical practices and ideas that ensure a high technical quality of the result. As an industry, we improved massively in that direction. But building the product right and building the right product are two very different things. We need both to be successful. The traditional solutions to this were big functional specifications, requirements documents and long testing phases. These just don't work in the world of weekly software deliveries. We need a solution that gives us a way to: Avoid wasteful over-specifying and spending time on detailing things that will change before even being developed. Have reliable documentation that explains what the system does so that we can change it easily. Keep that documentation relevant and reliable with minimal maintenance costs. Fit all this into short iterations and flow-based processes, so that the information on upcoming work is produced just in time. Although these goals might seem conflicting at first, many teams have succeeded in fulfilling all of them. In the research leading to this book, I interviewed 30 teams that implemented around 50 projects. I looked for patterns, common practices and identified underlying principles behind these practices. Taking the smallest set of common ideas from all these projects, I can now safely define the solution: Specification by Example. Specification by Example is a set of process patterns that help teams build the right software product. These patterns help teams write just enough documentation to facilitate change effectively in short iterations or flow based development. I introduce the key process patterns of Specification by Example in the next chapter. In this one, I want to explain the benefits. In the true Specification by Example style, I will not build a business case for the theme of this book by explaining benefits in a theoretical introduction. Instead of that, here are 18 real world examples of teams that got big dividends from Specification by Example. It is very hard to isolate the impact or effect of any single idea on a project. The practices described in this book work together with many other more established agile software development practices (such as test driven development, continuous integration and planning with user stories), enhancing their effectiveness. Likewise, other agile software development ideas help to support these practices. However, when we consider a range of projects in different contexts, patterns emerge. Some of the teams I interviewed had an agile process before implementing Specification by Example, some of them implemented the practices at the time when they were moving to an agile process. Most of the teams used iteration based processes such as Scrum and Extreme Programming (XP) or flow based processes such as Kanban, but some even used these practices in an environment that would not be considered agile by any standards. Yet most of them reported similar effects: Implementing changes more efficiently: They had a living documentation, a reliable source of information on system functionality, which enabled them to analyze the impact of potential changes and share knowledge effectively. Higher product quality: They defined expectations clearly and made the validation process very efficient. Less rework: They collaborated better on specifications and ensured a shared understanding of the expectations by all team members. Better alignment of development and testing: Improved collaboration led to much more regular flow of delivery. In the next four sections, we look into each of those benefits in much more detail, with some real-world examples.",

        "key": "Chapter 2",
        "heading": "Key process patterns",
        "body": "Specification by Example is set of process patterns that facilitate change in software products to ensure that the right product is delivered efficiently. When I say the right product, I mean software that delivers the required business effect or fulfills a business goal set by the customers or business users, and it is flexible enough to be able to receive future improvements with a relatively flat cost of change. These key patterns are commonly shared by the most successful teams that I interviewed in researching this book. Figure 2.1 shows these process patterns and their relationships. These processes are patterns because they occur in several different contexts and produce similar results. Most of the teams implemented these process ideas by trial and error, looking for better ways to do things and implement software more efficiently. By exposing these concepts as patterns, I hope to help others implement these ideas deliberately, instead of going through a lengthy process of discovery. In Bridging the Communication Gap , I focused mostly on the tangible outputs of Specification by Example, such as specifications and acceptance tests. I completely neglected the fact that teams in various contexts might need radically different approaches to produce the same artifacts. In this book, I focus much more on the process patterns, on how these artifacts get created and contribute to the later artifacts in the flow. The diagram in Figure 2.1 shows a sequence but successful teams do not do the entire sequence at once, for all the specifications, especially not before any development starts. They derive the scope from goals once a team is ready for more scope - for example at the start of a project phase or a milestone. They proceed with specifications only when the team is ready to start implementing an item - for example at the start of the relevant iteration. Do not mistake this sequence for big waterfall specifications upfront. In this chapter, I present a brief overview of the key process patterns. We go over the key challenges and ideas for implementing each of these patterns in different contexts in Part II .",

        "id": "NormativeStatement_d5bef96e9b2c4539",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Teams using these processes need specifications that can appear just in time when they are needed and ideally do not require a lot of time to prepare."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_ee4a6756fd094b57",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "They need to eliminate as many causes of misunderstanding as possible, maintain the least amount of documentation that can support development effectively, and make vali-dation processes as automated and as fast as possible."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_baf897610514f802",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "They have to remove as many of these expected obstacles as they can so that they can handle unexpected issues in short iterations."
      }
    },
    {
      "data": {
        "id": "Section_878cd70a885bc87e",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 3",
        "heading": "Initiating the changes",
        "body": "Many ideas central to Specification by Example have been around for decades. Gerald Weinberg wrote about the communication problems with software requirements in the late eighties. In Exploring Requirements1, he suggested that the best way to check for completeness and consistency of requirements is to design black-box tests against them, effectively suggesting the duality of specifications and tests in Specification by Example. The German army used what later became the V Model in 1986, describing the ideas of building acceptance tests before implemen-tation and using them for validation. We use the same thing but call acceptance tests specifications with examples. Ward Cunningham applied the practices of illustrating using examples and automating validation without changing specifications on the WyCASH+ project in 1989.2 These ideas, unfortunately, did not catch on then. Long development phases made them simply impossible. People spent months trying to write abstract require-ments for three year long projects. Detailing everything upfront with examples would delay that even longer. On the other hand, by throwing away everything that couldn't fit into the length of a two-week iteration, teams using agile software development processes could not apply any of the previously established analysis and testing techniques. Flow based processes, such as Kanban, make it even harder to use traditional analysis and test-ing ideas. Teams using these processes need specifications that can appear just in time when they are needed and ideally do not require a lot of time to prepare. They need to eliminate as many causes of misunderstanding as possible, maintain the least amount of documentation that can support development effectively, and make vali-dation processes as automated and as fast as possible. They have to remove as many of these expected obstacles as they can so that they can handle unexpected issues in short iterations. Adam Geras put that more eloquently as: \"quality is about being pre-pared for the usual so you have time to tackle the unusual\". Agile development changed the way the industry thinks about software delivery phases - and made them a lot shorter. This made Specification by Example feasible. At the same time, iteration and flow based projects can benefit greatly from Specification by Example. With so little time to complete a delivery phase, we need to eliminate as much unnecessary work as possible. Good candidates for optimization are rework, duplicated tasks caused by miscommunication, spending time to under-stand the system by working back from code, and executing the same tests manually over and over. Living documentation simply makes all these problems go away. That is why there is so much interest in these ideas now. Specification by Example is a good solution for dealing with the usual, so that we have more time to deal with the unusual within the few days or weeks that a software delivery cycle takes. Living documentation is now not just a possibility, but a requirement for success. In this chapter, we look at how to begin changing the process and the team cul-ture to implement Specification by Example. We wrap that up with three represen-tative case studies of how teams integrated collaboration on specifications into itera-tions and flow development. At the end, I present some good ideas for fitting this process into development environments that require signoff and traceability on requirements.",
        "subsections": "[]",
        "glossary_terms": "[]"
      }
    },

    {
      "data": {
        "id": "Section_29eff350a17dfd25",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 4",
        "heading": "Deriving scope from goals",
        "body": "The F16 Falcon is arguably the most successful fighter airplane ever designed, but it achieved great success against all odds. Fighter jets in the seventies had to be built for speed. Range, weaponry and maneuverability were of little importance to get a production contract. Yet F16 was not built for top speed, but for range and maneu-verability.1 In 97 Things Every Architect Should Know 2, Einar Landre quotes Harry Hillaker, the lead designer of F16, saying that the original requirement for that airplane was to reach speeds of 2-2.5 Mach. When Hillaker asked the US Air Force why that was important, he got the answer 'to be able to escape from combat'. Hillaker's design never got above 2 Mach, but it allowed pilots to escape from combat with superior agility. It featured many innovations including a frameless bubble canopy for better visibility, a reclined seat to reduce the effect of G-forces on the pilot, a display which projects combat information in front of the pilot without obstructing his view and side-mounted control sticks to ease maneuvering at high speed. With these features, F16 was superior to alternative designs but cheaper to make and got selected for pro-duction. Thirty four years later, it is still being produced. With more than 4400 air-craft sold to 25 countries3, the model was a great commercial success. Because of its great maneuverability, it is still one of the most popular airplanes for Hollywood action movies, as confirmed by its use in recent blockbusters such as X2 and Transformers: Revenge of the Fallen. The success of F16, against the odds, rests on the fact that it solved a problem for its customers in a way that was better and cheaper than what they originally asked for. The original requirements, including the 2.5 Mach speed, were a suggested solu-tion to a problem that was not communicated to anyone. Instead of implementing those requirements, the designers sought to understand the real goals and derived their design from that, not from some arbitrary expected functionality. That is the essence of successful product design and it is equally applicable to software as it is to airplanes. Most of the business users and customers I worked with have an inclination to present requirements as solutions, not as goals which they want to achieve or prob-lems they need to solve. I've seen far too many teams which suffered from a deadly misconception that the customers are always right and that what they ask for is set in stone, which leads teams to blindly accept those suggested solutions and then struggle to implement them. Successful teams don't do that. Similar to the F16 designers, successful teams push back and understand the real problem, then collaboratively design the solution. They don't do this just on the implementation level, but on the scope level as well. Scope implies a solution. Instead of pushing the responsibility for scope away, successful teams are proactive and col-laboratively come up with good scope with the business users, so that their goals are met. This is the essence of Deriving Scope from Goals. Deriving scope from goals is undoubtedly the most controversial topic in this book. The surge in popularity of value-chains in software development over the last five or so years increased the awareness of the idea of collaborating on scope and focusing it from business goals in the community. On the other hand, most teams I work with still think that project scope is not under their control and expect cus-tomers or business users to fully define it. Enough teams from my research derived their project scope from goals to call this a pattern, but this practice is much less common than any other key pattern. I originally thought about leaving this chapter out. I decided to include it for three reasons: Defining scope plays a very important part in the whole process of building the right software. If you get that wrong, the rest is just painting the corpse. This is going to be one of the most important topics for software develop-ment in the future and I want to raise awareness about it. It fits very nicely into value-chains that are becoming increasingly popular because of Lean software development. In the following two sections I cover good ideas for influencing scope for teams that have direct control over it and for teams that do not. Teams that have high-level control of their project scope can be proactive and build the right scope straight away. In many large organizations I work with, teams unfortunately do not have such control, but this does not mean that they cannot influence scope.",
        "subsections": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"
      }

      "data": {
        "id": "Section_c62dec2b1e221f04",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 5",
        "heading": "Specifying Collaboratively",
        "body": "Specification by Example is conceptually different from traditional specification or testing processes, especially in the way it relies on collaboration. Even if we imple-ment all the other process patterns, if we write documents in isolation, Specification by Example won't work. In Bridging the Communication Gap, I offered big all-team specification work-shops as the main tool for collaborating on specifications. Probably the biggest les-son for me from working on this book is that the situation is a lot more complicat-ed. Teams in different contexts have completely different ways of collaborating on specifications, to the extent that even different teams in the same group approach this collaboration differently. In this chapter, I present the most common models for collaboration on specifi-cations, including big workshops, smaller workshops, and the most popular alterna-tives to workshops. This will help you understand the benefits and downsides of var-ious approaches to collaborative specifications. I also present good practices for preparing for collaboration and ideas that will help you choose the right collabora-tion model for your team. But let's first deal with the question of whether collabora-tion is required at all.",

    {
      "data": {
        "id": "Section_95e2a6cddf335ad7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 6",
        "heading": "Illustrating using examples",
        "body": "Examples are a very good way to avoid ambiguities and make things precise. We use them in every day communication and in writing without even thinking about it. For example, googling for the phrase 'for example' I found more than 210 mil-lion pages online, and this doesn't even include the ones that used abbreviations such as i.e. and e.g. With traditional specifications, examples appear and disappear several times in the software development process. Business analysts often get examples of existing orders, invoices and reports from business users, which they translate into abstract requirements. Developers come up with examples to clarify edge cases with business users or analysts and then translate them to code without recording the examples. Testers design test cases which are examples of how the system is expected to work, but they keep these examples to themselves and do not communicate them to devel-opers or analysts. Everyone invents their own examples and there is nothing to ensure that these examples are even consistent, let alone complete. This is why the telephone game happens in software development, and why the end result is often different from what was expected at the beginning. To avoid it, we have to prevent the translation between different roles and have one source of truth. Examples are a good tool for avoiding these communication problems. We can avoid the telephone game by ensuring that we capture all the examples (from start to finish) and use them consistently in analysis, development and testing. Marta Gonzalez Ferrero worked as a test lead at Beazley when they were intro-ducing Specification by Example. According to her, the development team was over-committing a lot and they often realized that they needed a lot more information than they were getting when the implementation started. They were running six week iterations and the development team and the business analysts were on differ-ent continents. The acceptance criteria they were receiving from the business analysts was rela-tively abstract (\"make sure that for this business units all correct products are dis-played\"). Finding out that something important was missing half-way through an iteration would seriously disrupt the output. One iteration ended with customers saying that the team delivered something completely different from what they expected. The last week of each iteration was reserved for the model office, effective-ly an iteration demonstration. Ferrero traveled to the US for one model office and used two days to work with business analysts on illustrating requirements with examples. As a result, the team committed to 20% less work for the next iteration and delivered what they commit-ted to. \"The feeling in the team was also much better\", said Ferrero, \" before that, [ the developers ] were working with a feeling that they were making it up as they go, and had to wait for feedback from business analysts\". According to Ferrero, after they started illustrating requirements using examples, the amount of rework significantly dropped. They are not the only team to experience such effects. In fact, almost all the teams in the research leading to this book confirmed that illustrating requirements using examples is a much more effective technique than specifying it with abstract statements. Examples are concrete and unambiguous enough to make requirements very precise - this is why we use them in everyday communication to clarify things. In Exploring Requirements,1 Gerald Weinberg and Donald Gause wrote that one of the best ways to check if the requirements are complete is to try to design black-box test cases against them. If we don't have enough information to design good test cases, we definitely don't have enough information to build the system. Illustrating requirements using examples is a way to specify how we expect the sys-tem to work in enough detail to be able to check that assertion. In fact, examples we use to illustrate requirements are very good black-box tests. From my experience, it takes at least an order of magnitude less time to illustrate requirements with examples than to implement them. Likewise, it takes at least an order of magnitude less time to understand that we don't have enough information to illustrate something with examples than to get to the same realization by trying to implement the software. Instead of starting to develop an incomplete story and see it blow up in the middle of an iteration, we can make it blow up during the collab-oration on specifications while the business users are still readily available. In May 2009 I ran a three hour workshop on Specification by Example2 during the Progressive .NET tutorials. Around 50 people, mostly software developers and testers, participated in this workshop. We simulated a frequent situation where a cus-tomer points the team to a competitor site and asks them to copy some functionality. I copied the rules of a blackjack game from a popular online games site, and asked the participants to illustrate those rules using examples. Although the require-ments were taken from a real games site and fit on a single A4 sheet of paper, they were ambiguous, redundant and incomplete. This is consistent with my experiences of getting requirements written as Word documents. In a quick poll during the work-shop, we established that all the participants had similar experiences as well. The participants were divided into seven teams, so that each team had only one person who knew anything about blackjack. After the workshop, all the participants agreed that discussing realistic examples helped flush out inconsistencies and func-tional gaps. By running a feedback exercise (see sidebar) I measured the level of shared understanding. Six out of seven teams came up with the same answers to dif-ficult edge cases, even though most people on the team had no previous exposure to the target domain. To ensure that we have fully illustrated a feature using examples, our examples should be: Precise Complete Realistic Easy to understand Illustrating requirements using examples is a simple idea, but it is far from easy to implement. Finding the right set of examples to illustrate a requirement turns out to be quite a challenge, especially when the underlying functionality is cross-cutting across the system. To put things into perspective, I first show an example of the process in this chapter. Then I present good ideas for identifying the right set of examples to illus-trate a business function. Finally, I present ideas for illustrating cross-cutting func-tionality and concepts that are not easy to capture with precise values.",
        "subsections": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"
      }
    },

    {
      "data": {
        "id": "Section_3b6a11f95583d17e",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 7",
        "heading": "Refining the specification",
        "body": "In its rough form, a diamond is a lusterless, translucent crystal that resembles a chip of broken glass. For it to be transformed into a jewel, it must be cut into a particular gem shape and then polished, facet by facet - Edward Jay Epstein, The Diamond Invention 1 Collaborative discussion is a great way to build a shared understanding, but that is not enough to drive any but the simplest of projects. Unless the team is very small and the project is very short, we need to record this knowledge in a way that does not depend on peoples' short term memory. Taking a photo of the whiteboard after a discussion on key examples is a simple way to capture this knowledge, but the examples are just raw material. Raw exam-ples are like uncut diamonds - very valuable, but not nearly as much as in a processed form. Separating real diamonds from rock, polishing them and breaking them apart into sizes that are easy to sell increases the value significantly. The same can be said for the key examples we used to illustrate a requirement. They are a great starting point, but in order to get the most value out of them we have to refine them, polish them to show the key points clearly and create specifications that teams can use both now and in the future. One of the most common reasons for failing with Specification by Example is not taking the time to process these raw examples. Discussion about specifications often leads to experimentation. We discover new insights and restructure examples to look at them from a higher level of abstraction. This results in some great exam-ples, but also a lot of dead ends and rejected ideas. We don't necessarily need to capture all these intermediary examples or record how we got to the end result. On the other hand, just recording the key examples we want to keep without any explanation won't allow us to communicate the specification effectively to anyone who hasn't participated in the discussions. Successful teams don't use raw examples, they Refine the Specification from them. They extract the essence from the key examples and turn them into a clear and unambiguous definition of what makes the implementation done, without any extra-neous detail. This acceptance criteria is then recorded and described so that anyone can pick up the resulting specification and understand it at any time. This specifica-tion with examples captures the conditions of satisfaction, the expected output of a feature, its acceptance test. Ideally, a specification with examples should unambiguously define the required functionality from a business perspective, but not how the system is supposed to implement it. This gives the development team the freedom to find the best possible solution that meets the requirements. To be effective in these goals, a specification should be: Precise and testable A true specification, not a script About business functionality, not about software design Once the functionality is implemented, the specification that describes it will serve a different purpose. It will document what the system does and alert us about func-tional regression. To be useful as long-term functional documentation, the specifica-tion has to be written so that others can pick it up months or even years after it was created and easily understand what it does, why it is there and what it describes. To be effective in these goals, a specification should be: Self explanatory Focused In domain language This chapter focuses on how to refine specifications to achieve all these goals. But first, to put things into a more concrete perspective, I show examples of good and bad specifications.",
        "subsections": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"
      }
    },

      "data": {

        "citation": "Parts of our e-mail conversation are published online. See http://jamesshore.com/Blog/Alternatives-to-Acceptance-Testing.html, http://jamesshore.com/Blog/The-Problems-With-Acceptance-Testing.html and http://gojko.net/2010/03/01/are-tools-necessary-for-acceptance-testing-or-are-they-just-evil/ You will also find the links to opinions of other community members on this topic in those articles. I strongly suggest reading those articles, especially Shore's discussion about alternatives to automation of executable specifications."

    {
      "data": {
        "id": "Reference_eccd66bea4b7ddc3",

      "data": {
        "id": "Section_d53ff1a8fd977efb",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 8",
        "heading": "Automating validation without changing specifications",
        "body": "After we refine the specification of a feature, it becomes a clear target for imple-mentation and a precise way to measure when we are done. The refined specification also allows us to check whether our system still has the required functionality in the future, every time we change it. Because of the level of detail that we get from illus-trating the specifications using examples, it becomes impossible to manually run all the checks within short iterations, even for mid-sized projects. The solution is obvi-ous: we have to automate as many of these checks as possible. The right automation for validating specifications with examples is quite differ-ent from traditional test automation in software projects. If we have to significantly change the specification while automating it, the telephone game starts all over again and the value of refining the specification is lost. Ideally, we should automate the val-idation processes for our specifications without distorting any information. This introduces an additional set of challenges on top of the usual test automation issues. In this chapter I present advice on how to get started with automating validation of specifications without changing them, and how to control the long-term mainte-nance costs of automation. I then cover the two areas that caused the most problems for the teams I interviewed: automating user interfaces, and managing data for auto-mated test runs. But before we start with that, I will address a question that is often raised in mailing lists and online forums - do we need this new type of automation at all? Because automation is a highly technical problem, this chapter is going to be more technical than the others. If you are not a developer or an automation special-ist, you might find it hard to follow some parts. I suggest you read the first two sec-tions, then skip the rest of this chapter. You won't lose anything that interests you.",

      "data": {
        "id": "Section_99916d52fafff0b7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 9",
        "heading": "Continuous Validation",
        "body": "In the 1950s, the California Department of Transportation had a problem with motorway lane markers. The lines were wearing out, and someone had to repaint them every season. This was costly, caused disruption to traffic, and was dangerous for the people who were charged with that task. Dr. Elbert Dysart Botts worked on solving that problem and experimented with more reflective paint, but this proved to be a dead end. Thinking outside the box, he invented raised lane markers, called Botts' Dots. Botts' Dots were visible by day or night, regardless of the weather. They did not wear out as easily as painted lane mark-ers. Instead of relying just on drivers' sense of sight, Botts' Dots cause a tactile vibra-tion and audible rumbling when drivers move across designated travel lanes. This feedback proved to be one of the most important safety features on motorways, alert-ing inattentive drivers to potential danger when they drift from their lane. Botts' Dots were introduced to software development as one of the original twelve Extreme Programming practices, called continuous integration (CI). Continuous integration alerts inattentive software teams when they start to drift from a product that can be built and packaged. A dedicated continuous integration system frequently builds the product and runs tests to ensure that the system does-n't just work on a developer's machine. By flagging potential problems quickly, this practice allows us to stay in the middle of the lane and take small and cheap correc-tive action when needed. Continuous integration ensures that once the product is built right, it stays right. The same principles apply to building the right product. Once the right prod-uct is built, we want to ensure that it stays right. If it drifts from the designated direc-tion, we can solve the problem much more easily and cheaply if we know about it quickly and don't let problems accumulate. Executable specifications allow us to implement continuous validation. A continuous build server2 can frequently check all the specifications and ensure that the system still satisfies them. Continuous integration is a well documented software practice, and many other authors have already done a good job explaining it in detail. I do not wish to repeat how to set up continuous integration with unit tests in general, but continuous vali-dation has an additional set of challenges that are important for the topic of this book. The main difference between the two types of checks is that continuous integra-tion mostly relies on technical (unit) tests and continuous validation relies on busi-ness (acceptance) tests defined using executable specifications. Unit tests can run and should run in isolation, but running functional acceptance tests in that way would not give us the confidence we need. Many teams that used Specification by Example to extend existing systems found that executable specifications have to run against a real database with realistic data, external services or a fully deployed web site. Functional acceptance tests check the functionality across many components, and if the system is not built up front to be testable, such checks often require the entire system to be integrated and deployed. This causes three groups of problems for continuous validation (in addi-tion to those usual for continuous integration): Unreliability caused by environmental dependencies: Unit tests are largely independent of the test environment, but executable specifications might depend heavily on the rest of the ecosystem they run in. Environment issues can cause the tests to fail even if the programming language code is correct. To get confidence in acceptance test results, we have to solve or mitigate these environmental problems and make the test execution reliable. Slower feedback: Functional acceptance tests on brownfield projects will often run an order of magnitude slower than unit tests. I'd consider a unit test pack slow if it runs for several minutes. Anything close to ten minutes would be definitely too slow and I'd seriously start investigating how to make it run faster. On the other hand, I've seen acceptance test packs that had to run for several hours and could not be optimized without reducing confi-dence in the results. Such slow overall feedback requires us to come up with a solution to get fast feedback from selected parts of the system on demand. Managing failed tests: A large number of coarse grained functional tests that depend on many moving parts required some teams, especially when they started implementing Specification by Example, to manage failing tests instead of fixing them straight away. In this chapter, I discuss how teams from my research handled these two problems. We first go over good ideas to make validation more reliable and then look at speed-ing up feedback.",
        "subsections": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"
      }

    {
      "data": {
        "id": "Section_0589121286c9ad89",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 10",
        "heading": "Evolving a documentation system",
        "body": "For many teams I interviewed, the long term value of Specification by Example comes from living documentation. If executable specifications were pages, a living documentation system would be the book that holds those pages and makes them into a consistent document. Most teams got to such a system by chance and then realized how valuable it is. One of my main goals with this book is to expose living documentation as a first-class artifact of specification by example, and help the readers get to such a system intentionally. I've lost count of the number of projects where someone has given me a 500 page book that explains what a system was supposed to do, with a remark that the document is 'not entirely correct'. Like cheap wine, long paper documentation ages rapidly and leaves you with a bad headache if you try to use it a year after it was cre-ated. On the other hand, maintaining a system without any documentation causes headaches as well. We need to know what a system does to be able to analyze the impacts of suggested changes, to support and troubleshoot it. Very often, the only way to really find out what the system does is to look at the programming language source code and reverse engineer the business functionality. Christian Hassa calls this process of digging out functionality from the code 'system archaeology'. He explains an example that will no doubt be familiar to most readers: Even when the undocumented code is correct, reverse-engineering business function-ality from it is an impossible task for business users, testers, support engineers, and on most projects even for an average developer. Clearly this approach doesn't work. We need something better. The ideal solution would be a documentation system that is easy and cheap to maintain, so that we can keep it consistent with the system functionality even if we change the underlying programming language code frequently. Luckily, once continuous validation is in place, we have a potential to create a better solution. When a system is continuously validated against a set of executable specifications, we can be certain that it still does what the specifications say - or, to put differently, that the specifications still describe what the system actually does. Those specifications live with the system and they are always consistent. We quickly find out about any differences between the specifications and the underlying system functionality, so we can keep them consistent cheaply. All those executable specifications together create a living documentation sys-tem, an authoritative source of information on the functionality of a system that does not suffer from the 'not entirely correct' problem and is relatively cheap to maintain. Lisa Crispin said that one of the biggest a-ha moments for her was when she understood how valuable executable specifications were as documentation: Andrew Jackman said that the Sierra team at BNP Paribas in London uses a living documentation system as a knowledge base for support: Tim Andersen said that he only trusts this kind of documentation: Living documentation is more than just a directory full of executable specification files. To get the benefits out of it, we have to organize specifications so that they make sense together and add relevant contextual information that will allow us to under-stand individual parts. Adam Knight's team at Rainstor uses living documentation in the form of a HTML reports built from executable specifications. He says: Ideally, a living documentation system should help us efficiently understand what our system does, which means that the information has to be: Easy to understand Consistent Organized for easy access In the following three sections I present the practices that the teams from my research used to fulfill those three goals.",
        "subsections": "[]",
        "references": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"

      "data": {
        "id": "Section_a37a179655406fd7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 11",
        "heading": "uSwitch",
        "body": "uSwitch.com is one of the busiest UK web sites. The basic function of the web site is to compare prices and services of everything from energy suppliers to credit cards and insurance providers. The complexity of their software system is driven by high scalability, but also by complex integrations with a large number external partners. uSwitch is an interesting case study because their example shows that teams working in a waterfall process on a legacy environment with lots of quality problems, with separate development and testing teams, can still make the transition to a much better way of delivering quality software. They completely overhauled the software delivery process over the course of three years, reaching the point that sounds almost zen-like. I interviewed Stephen Lloyd, Tony To, Damon Morgan, Jon Neale and Hemal Kunt-awala there. When I asked them about their software process, their answer was something in the lines of: someone suggests an idea in the morning, then it gets implemented and goes live. Very early in my career I worked for a company where we built software exactly that way, with fireworks on the production systems almost daily. In the case of uSwitch, however, the quality of the product and the speed with which they deliver features is very enviable. Although they did not set out to implement Specification by Example in particular, their current process contains the most important practices described in this book, including goal driven scoping, collaboration on specifications and automated executable specifications. To improve the process of developing software, they focused on improving quality of the product, always looking for the next biggest obstacle to quality and removing it. Looking for a better way to align development and testing they automated tests in human readable form. After that, they discovered that tests can become specifications. Moving to executable specifications got them to collaborate better. Working on refining the process, they had to make continuous validation more reliable which led them to discover better ways to refine the specifications. Looking for better ways to engage business users, they implemented goal-driven scoping.",
        "subsections": "[]",
        "glossary_terms": "[]",

      "data": {
        "id": "Section_0490d24e576fdc03",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Chapter 12",
        "heading": "Rainstor",
        "body": "RainStor 1 is a UK company that builds high capacity data archiving and management systems. RainStor is an interesting case study because they deal with a very technical domain where complexity comes from high data volumes and high performance requirements, combined with advanced compression and data management algorithms. The entire company has less than 30 employees and about half of them work in Research and Development, so they have to be very efficient in building and supporting their software. All their developers and testers work as part of the same Scrum team, although they are now thinking about splitting it into two. Their journey to Specification by Example was almost organic, without any big plans or buzzwords, driven mostly by the testers. When I interviewed Adam Knight, senior test and support team leader at RainStor, he said that \"nobody else in the company knows what acceptance test driven development means\". Although their process has almost all the key elements of Specification by Example, they just think about it as their home-grown way of developing software. They illustrate requirements using examples, automate them into executable specifications and validate them frequently to build a living documentation system. The changes they implemented allowed the development team to triple in size over three years, at the same time making them more effective.",

    {
      "data": {
        "id": "Section_03dc5db2419beb95",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "1",
        "heading": "Key Benefits",
        "body": "In this age of Internet, delivery speed seems to be the theme of the day in software development. A decade ago, projects lasted several years and project phases were measured in months. Today, most teams I work with deal with projects measured in months and project phases which are time-boxed to weeks or even days. Everything that smelled of long term planning simply got dropped in a realization that the future is unpredictable. Big up front software designs, detailed requirements analysis and anything else that required more time than an average project phase, were no longer viable. Good-bye code freezes and weeks of manual regression testing! With such a high frequency of change, documentation quickly became outdated. Detailed specifications, documentation and test plans required too much effort to keep current. They were just labeled as waste. These artifacts are collateral damage, casualties of the change to a model with fast and frequent deliveries. People who relied on them for their day-to-day work, such as business analysts or testers, often got very confused about what to do in this new world of weekly iterations. Software developers thought that they weren't affected that badly with the lack of paper documents, but this had a rippling effect on their work as well. Instead of the wastes of preparing documentation that nobody will ever read, we got the wastes of rework and just-in-case-code. Spending weeks iterating to polish the wrong product is as wasteful as was spending the same time building big plans. In the last decade, the software development community was mostly focused on building the software the right way -- on the technical practices and ideas that ensure a high technical quality of the result. As an industry, we improved massively in that direction. But building the product right and building the right product are two very different things. We need both to be successful. To build the right product efficiently, our software development practices have to provide the following: - Assurance that all stakeholders and delivery team members understand what needs to be delivered, and that they all understand it the same. - Precise specifications for development teams to avoid wasteful rework caused by ambiguities and functional gaps. - An objective measurement of being done. - Documentation to facilitate change, both in terms of software features and team structure. The traditional solutions to this were big functional specifications, requirements documents and long testing phases. These just don't work in the world of weekly software deliveries. We need a solution that gives us a way to: - Avoid wasteful over-specifying and spending time on detailing things that will change before even being developed. - Have reliable documentation that explains what the system does so that we can change it easily. - Keep that documentation relevant and reliable with minimal maintenance costs. - Fit all this into short iterations and flow-based processes, so that the information on upcoming work is produced just in time. Although these goals might seem conflicting at first, many teams have succeeded in fulfilling all of them. In the research leading to this book, I interviewed 30 teams that implemented around 50 projects. I looked for patterns, common practices and identified underlying principles behind these practices. Taking the smallest set of common ideas from all these projects, I can now safely define the solution: Specification by Example. Specification by Example is a set of process patterns that help teams build the right software product. These patterns help teams write just enough documentation to facilitate change effectively in short iterations or flow based development. I introduce the key process patterns of Specification by Example in the next chapter. In this one, I want to explain the benefits. In the true Specification by Example style, I will not build a business case for the theme of this book by explaining benefits in a theoretical introduction. Instead of that, here are 18 real world examples of teams that got big dividends from Specification by Example. It is very hard to isolate the impact or effect of any single idea on a project. The practices described in this book work together with many other more established agile software development practices (such as test driven development, continuous integration and planning with user stories), enhancing their effectiveness. Likewise, other agile software development ideas help to support these practices. However, when we consider a range of projects in different contexts, patterns emerge. Some of the teams I interviewed had an agile process before implementing Specification by Example, some of them implemented the practices at the time when they were moving to an agile process. Most of the teams used iteration based processes such as Scrum and Extreme Programming (XP) or flow based processes such as Kanban, but some even used these practices in an environment that would not be considered agile by any standards. Yet most of them reported similar effects: - Implementing changes more efficiently: They had a living documentation, a reliable source of information on system functionality, which enabled them to analyze the impact of potential changes and share knowledge effectively. - Higher product quality: They defined expectations clearly and made the validation process very efficient. - Less rework: They collaborated better on specifications and ensured a shared understanding of the expectations by all team members. - Better alignment of development and testing: Improved collaboration led to much more regular flow of delivery. In the next four sections, we look into each of those benefits in much more detail, with some real-world examples.",
        "subsections": "[]",
        "references": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"
      }
    },
    {
      "data": {
        "id": "Section_17deb99907addd3f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Implementing changes more efficiently",
        "heading": "Implementing changes more efficiently",
        "body": "In the long term, most teams discovered that a result of implementing Specification by Example is having a living documentation - a source of information about system functionality that is as reliable as the programming language code but much easier to access and understand. This documentation system allows teams to collaboratively analyze and understand the impact of proposed changes and discuss potential solutions. It also allows them to build new documents on existing set of documents, making the specification and change processes more efficient in the long term. The long-term benefits of living documentation are the most important lesson for me from the research leading to this book and one of the most important messages I want to convey. Because of that, I cover living documentation throughout this book. Iowa Student Loan Liquidity Corp. based in West Des Moines, Iowa, went through a fairly significant business model change in 2009. The financial market turmoil during the previous year made it nearly impossible for lenders to find funding sources for private student loans. Because of this, many lenders were forced to leave the private student loan market or change their business models. Iowa Student Loan was able to adapt. Instead of using bond proceeds to fund private student loans, it pooled funds from banks and other financial institutions. In order to support this, they had to perform a \"dramatic overhaul of a core piece of the system\", according to Tim Andersen, a software analyst and developer who works there. The team used living documentation as a primary mechanism for documenting business requirements while they were developing the software earlier. The living documentation system supported them in efficiently discovering the impact of new requirements, specifying the change and ensuring that the rest of the system still works as it was working before. Because of that, they were able to implement this fundamental change to the system and release it to production in just one month. A living documentation system was essential for this change. Andersen said: Any system that didn't have the tests [ living documentation ] would halt the development and it would have been a re-write. The Talia project team at Pyxis Technologies in Montreal, Canada, had a similar experience. Talia is a virtual assistant for enterprise systems, a chat robot with complex rules to communicate with employees. From the first day of development, the Talia team used Specification by Example and built up a living documentation system. After a year of development, they had to rewrite the core of the virtual agent engine from scratch. That is when the investment in living documentation really paid off. André Brissette, the Talia product director, said: Without that, any major refactoring would be a suicide. Their living documentation system gave the team confidence that the new system works the same as the old one when the change was complete. It also enabled Brissette to manage the project better and gave him visibility of the progress. The team at Songkick.com, a consumer website about live music based in London, UK, used a living documentation system to facilitate the changes while redeveloping activity feeds on the web site. They realized that the feeds were implemented in a way that would not scale to the required capacity. Phil Cowans, the CTO of Songkick, estimates that the team saved at least 50% of the time for implementing that change because they had a living documentation system. Cowans said: Because we had such a good coverage and we really trusted the tests [ in the living documentation system ] , we felt very confident making big changes to the infrastructure rapidly. We knew that the functionality wouldn't change or if it did change it would be picked up by a test. The development team at ePlan Services, a pension service provider based in Denver, Colorado, US, has been using the ideas of Specification by Example since 2003. They build and maintain a financial services application with lots of stakeholders, complex business rules and complex compliance requirements. Three years after starting the project, a manager with unique knowledge about the legacy parts of the system decided to move to India. According to Lisa Crispin, a tester working for ePlan Services and author of Agile Testing, the team worked hard to learn what the manager knew and build it into living documentation. A living documentation system enabled them to capture the specialist knowledge about their business processes and make it instantly available to all the team members. They eliminated a bottleneck in knowledge transfer which enabled them to efficiently support and extend the application. The Central Patient Administration project team at the IHC Group in Oostkamp, Belgium, implemented a living documentation system with similar results. The project, which started as a re-write of a legacy mainframe system, has been going on since 2000. Pascal Mestdach, a solution architect on the project, said that the team benefited greatly from it: There were just a few people who knew what some functionality on the legacy system did - that became much clearer now because the team has a growing suite of tests [ living documentation ] against that functionality and it describes what it does. Also questions can be answered when a specialist is on holiday. It's more clear to other developers what a piece of software is doing. And it is tested. A living documentation system helps delivery teams share knowledge and deal with staff changes. It also enables businesses to react to market changes more efficiently.",
        "subsections": "[]",
        "references": "[]",
        "glossary_terms": "[]",
        "normative_statements": "[]"
      }
    },

    {
      "data": {
        "id": "SpecificationByExample_9494168a55fd7c62",
        "label": "SpecificationByExample",
        "type": "entity",
        "__class__": "SpecificationByExample",
        "standard_id_or_title": "How successful teams deliver the right software",
        "metadata": "{'title': 'How successful teams deliver the right software', 'standard_id': None, 'revision_of': None, 'sponsor': None, 'approved_date': None, 'abstract': 'The book you hold in your hands, or on your screen, is the result of a research on how teams all over the world specify, develop and deliver the right software, without defects, in very short cycles. It presents the collective knowledge of about fifty projects, ranging from public web sites to internal back-office systems. These projects involved teams as diverse as small colocated teams and groups spread across different continents, working in a range of processes including Extreme Programming, Scrum, Kanban and similar methods often bundled together under the names Agile and Lean. They have one thing in common - they got the practices of collaborating on specifications and tests right and got big benefits out of that.', 'keywords': []}"
      }
    }
