        "text": "This should specify the following: The logical characteristics oj each interjace between the sojtware product and its users. This includes those configuration characteristics (e.g., required screen formats, page or window layouts, content of any reports or menus, or availability of programmable function keys) necessary to accom-plish the software requirements. All the aspects oj optimizing the interjace with the person who must use the system.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_553ef41540d821b8",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "User interfaces",
        "heading": "User interfaces",
        "body": "This should specify the following: 1. The logical characteristics oj each interjace between the sojtware product and its users. This includes those configuration characteristics (e.g., required screen formats, page or window layouts, content of any reports or menus, or availability of programmable function keys) necessary to accom-plish the software requirements. 2. All the aspects oj optimizing the interjace with the person who must use the system. This may simply comprise a list of do's and don'ts on how the system will appear to the user. One example may be a requirement for the option of long or short error messages. Like all others, these requirements should be verifiable, e.g., \"a clerk typist grade 4 can do function X in Z min after 1 h of training\" rather than \"a typist can do function X.\" (This may also be specified in the Software System Attributes under a section titled Ease of Use.)"
      }
    },
    {
      "data": {
        "id": "Section_834467e8590d2384",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Hardware interfaces",
        "heading": "Hardware interfaces",
        "body": "This should specify the logical characteristics of each interface between the software product and the hard-ware components of the system. This includes configuration characteristics (number of ports, instruction sets, etc.). It also covers such matters as what devices are to be supported, how they are to be supported, and protocols. For example, terminal support may specify full-screen support as opposed to line-by-line support."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_a594cf5fcc65ecb3",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "For each required software product, the following should be provided: Name; Mnemonic; Specification number; Version number; Source.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_89c42de3b7193013",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "For each interface, the following should be provided: Discussion of the purpose of the interfacing software as related to this software product. Definition of the interface in terms of message content and format.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_52c0a68851fdaeab",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Software interfaces",
        "heading": "Software interfaces",
        "body": "This should specify the use of other required software products (e.g., a data management system, an operat-ing system, or a mathematical package), and interfaces with other application systems (e.g., the linkage between an accounts receivable system and a general ledger system). For each required software product, the following should be provided: - Name; - Mnemonic; - Specification number; - Version number; - Source. For each interface, the following should be provided: - Discussion of the purpose of the interfacing software as related to this software product. - Definition of the interface in terms of message content and format. It is not necessary to detail any well-documented interface, but a reference to the document defining the interface is required."
      }
    },
    {
      "data": {
        "id": "Section_017d32738e1493ca",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Communications interfaces",
        "heading": "Communications interfaces",
        "body": "This should specify the various interfaces to communications such as local network protocols, etc."
      }
    },
    {
      "data": {
        "id": "Section_b2fce59ac388aec3",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Memory constraints",
        "heading": "Memory constraints",
        "body": "This should specify any applicable characteristics and limits on primary and secondary memory."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_acec8db599e6e419",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the normal and special operations required by the user such as The various modes of operations in the user organization (e.g., user-initiated operations); Periods of interactive operations and periods of unattended operations; Data processing support functions; Backup and recovery operations.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_b06b2c09add8ef06",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Operations",
        "heading": "Operations",
        "body": "This should specify the normal and special operations required by the user such as 1. The various modes of operations in the user organization (e.g., user-initiated operations); 2. Periods of interactive operations and periods of unattended operations; 3. Data processing support functions; 4. Backup and recovery operations. NOTE-This is sometimes specified as part of the User Interfaces section."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_5263165126620d67",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should Define the requirements for any data or initialization sequences that are specific to a given site, mission, or operational mode (e.g., grid values, safety limits, etc.);",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_93a7302f6a019e9b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Specify the site or mission-related features that should be modified to adapt the software to a partic-ular installation.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_a0131971c62f63ed",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Site adaptation requirements",
        "heading": "Site adaptation requirements",
        "body": "This should 1. Define the requirements for any data or initialization sequences that are specific to a given site, mission, or operational mode (e.g., grid values, safety limits, etc.); 2. Specify the site or mission-related features that should be modified to adapt the software to a partic-ular installation."
      }
    },
    {
      "data": {
        "id": "Section_334f4ea61401f9a0",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Product functions (2.2 of the SRS)",
        "heading": "Product functions (2.2 of the SRS)",
        "body": "This subsection of the SRS should provide a summary of the major functions that the software will perform. For example, an SRS for an accounting program may use this part to address customer account maintenance, customer statement, and invoice preparation without mentioning the vast amount of detail that each of those functions requires. Sometimes the function summary that is necessary for this part can be taken directly from the section of the higher-level specification (if one exists) that allocates particular functions to the software product. Note that for the sake of clarity 1. The functions should be organized in a way that makes the list of functions understandable to the customer or to anyone else reading the document for the first time. 2. Textual or graphical methods can be used to show the different functions and their relationships. Such a diagram is not intended to show a design of a product, but simply shows the logical relation-ships among variables."
      }
    },
    {
      "data": {
        "id": "Section_dd5f52e54f3e78ec",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "User characteristics (2.3 of the SRS)",
        "heading": "User characteristics (2.3 of the SRS)",
        "body": "This subsection of the SRS should describe those general characteristics of the intended users of the product including educational level, experience, and technical expertise. It should not be used to state specific requirements, but rather should provide the reasons why certain specific requirements are later specified in Section 3 of the SRS."
      }
    },
    {
      "data": {
        "id": "Section_ffb4787876496589",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Constraints (2.4 of the SRS)",
        "heading": "Constraints (2.4 of the SRS)",
        "body": "This subsection of the SRS should provide a general description of any other items that will limit the devel-oper's options. These include 1. Regulatory policies; 2. Hardware limitations (e.g., signal timing requirements); 3. Interfaces to other applications; 4. Parallel operation; 5. Audit functions; 6. Control functions; 7. Higher-order language requirements; 8. Signal handshake protocols (e.g., XON-XOFF, ACK-NACK); 9. Reliability requirements; 10. Criticality of the application; 11. Safety and security considerations."
      }
    },
    {
      "data": {
        "id": "Section_c682882b06eab9ca",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Assumptions and dependencies (2.5 of the SRS)",
        "heading": "Assumptions and dependencies (2.5 of the SRS)",
        "body": "This subsection of the SRS should list each of the factors that affect the requirements stated in the SRS. These factors are not design constraints on the software but are, rather, any changes to them that can affect the requirements in the SRS. For example, an assumption may be that a specific operating system will be available on the hardware designated for the software product. If, in fact, the operating system is not avail-able, the SRS would then have to change accordingly."
      }
    },
    {
      "data": {
        "id": "Section_91a8de3b6de02a35",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Apportioning of requirements (2.6 of the SRS)",
        "heading": "Apportioning of requirements (2.6 of the SRS)",
        "body": "This subsection of the SRS should identify requirements that may be delayed until future versions of the system."
      }
    },
    {
      "data": {
        "id": "Section_18df2a6b7ebd7f07",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Specific requirements (Section 3 of the SRS)",
        "heading": "Specific requirements (Section 3 of the SRS)",
        "body": "This section of the SRS should contain all of the software requirements to a level of detail sufficient to enable designers to design a system to satisfy those requirements, and testers to test that the system satisfies those requirements. Throughout this section, every stated requirement should be externally perceivable by users, operators, or other external systems. These requirements should include at a minimum a description of every input (stimulus) into the system, every output (response) from the system, and all functions performed by the system in response to an input or in support of an output. As this is often the largest and most impor-tant part of the SRS, the following principles apply: 1. Specific requirements should be stated in conformance with all the characteristics described in 4.3. 2. Specific requirements should be cross-referenced to earlier documents that relate. 3. All requirements should be uniquely identifiable. 4. Careful attention should be given to organizing the requirements to maximize readability. Before examining specific ways of organizing the requirements it is helpful to understand the various items that comprise requirements as described in 5.3.1 through 5.3.7."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_853c8983c900eea4",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It should include both content and format as follows: Name of item; Description of purpose; Source of input or destination of output; Valid range, accuracy, and/or tolerance; Units of measure; Timing; Relationships to other inputs/outputs; Screen formats/organization; Window formats/organization; Data formats; Command formats; End messages.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_913da50d6eb5922f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "External interfaces",
        "heading": "External interfaces",
        "body": "This should be a detailed description of all inputs into and outputs from the software system. It should complement the interface descriptions in 5.2 and should not repeat information there. It should include both content and format as follows: 1. Name of item; 2. Description of purpose; 3. Source of input or destination of output; 4. Valid range, accuracy, and/or tolerance; 5. Units of measure; 6. Timing; 7. Relationships to other inputs/outputs; 8. Screen formats/organization; 9. Window formats/organization; 10. Data formats; 11. Command formats; 12. End messages."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_ea2bf90aec55c5ae",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "These are generally listed as \"shall\" statements starting with \"The system shall.\"",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e701ae5372b79b7d",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It may be appropriate to partition the functional requirements into subfunctions or subprocesses.",
        "modality": "may"
      }
    },
    {
      "data": {
        "id": "Section_19b666cc527e40b2",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Functions",
        "heading": "Functions",
        "body": "Functional requirements should define the fundamental actions that must take place in the software in accepting and processing the inputs and in processing and generating the outputs. These are generally listed as \"shall\" statements starting with \"The system shall.\" These include 1. Validity checks on the inputs 2. Exact sequence of operations 3. Responses to abnormal situations, including 1. Overflow 2. Communication facilities 3. Error handling and recovery 4. Effect of parameters 5. Relationship of outputs to inputs, including 1. Input/output sequences 2. Formulas for input to output conversion It may be appropriate to partition the functional requirements into subfunctions or subprocesses. This does not imply that the software design will also be partitioned that way."
      }
    },
    {
      "data": {
        "id": "Section_5765d4df89869d69",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Performance requirements",
        "heading": "Performance requirements",
        "body": "This subsection should specify both the static and the dynamic numerical requirements placed on the soft-ware or on human interaction with the software as a whole. Static numerical requirements may include the following: 1. The number of terminals to be supported; 2. The number of simultaneous users to be supported; 3. Amount and type of information to be handled. Static numerical requirements are sometimes identified under a separate section entitled Capacity. Dynamic numerical requirements may include, for example, the numbers of transactions and tasks and the amount of data to be processed within certain time periods for both normal and peak workload conditions. All of these requirements should be stated in measurable terms. For example, 95% oj the transactions shall be processed in less than J s. rather than, An operator shall not have to wait jor the transaction to complete. NOTE-Numerical limits applied to one specific function are normally specified as part of the processing subparagraph description of that function."
      }
    },
    {
      "data": {
        "id": "Section_62ee617868f0f002",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Logical database requirements",
        "heading": "Logical database requirements",
        "body": "This should specify the logical requirements for any information that is to be placed into a database. This may include the following: 1. Types of information used by various functions; 2. Frequency of use; 3. Accessing capabilities; 4. Data entities and their relationships; 5. Integrity constraints; 6. Data retention requirements."
      }
    },
    {
      "data": {
        "id": "Section_0a5c4f7c435fcfb2",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Design constraints",
        "heading": "Design constraints",
        "body": "This should specify design constraints that can be imposed by other standards, hardware limitations, etc."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_af4af35bd6c0009e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should specify the requirements derived from existing standards or regulations.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b93f662952929aa2",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "An audit trace requirement may, for example, state that all changes to a payroll database must be recorded in a trace file with before and after values.",
        "modality": "must"
      }
    },
    {
      "data": {
        "id": "Section_cee3a9f96facd46b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Standards compliance",
        "heading": "Standards compliance",
        "body": "This subsection should specify the requirements derived from existing standards or regulations. They may include the following: 1. Report format; 2. Data naming; 3. Accounting procedures; 4. Audit tracing. For example, this could specify the requirement for software to trace processing activity. Such traces are needed for some applications to meet minimum regulatory or financial standards. An audit trace requirement may, for example, state that all changes to a payroll database must be recorded in a trace file with before and after values."
      }
    },
    {
      "data": {
        "id": "Section_e5b727e4a80f5c52",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Software system attributes",
        "heading": "Software system attributes",
        "body": "There are a number of attributes of software that can serve as requirements. It is important that required attributes be specified so that their achievement can be objectively verified. Subclauses 5.3.6.1 through 5.3.6.5 provide a partial list of examples."
      }
    },
    {
      "data": {
        "id": "Section_230c14fc99035d53",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Reliability",
        "heading": "Reliability",
        "body": "This should specify the factors required to establish the required reliability of the software system at time of delivery."
      }
    },
    {
      "data": {
        "id": "Section_1bd768ab705a37e2",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Availability",
        "heading": "Availability",
        "body": "This should specify the factors required to guarantee a defined availability level for the entire system such as checkpoint, recovery, and restart."
      }
    },
    {
      "data": {
        "id": "Section_006cfd2d29d49b3b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Security",
        "heading": "Security",
        "body": "This should specify the factors that protect the software from accidental or malicious access, use, modifica-tion, destruction, or disclosure. Specific requirements in this area could include the need to 1. Utilize certain cryptographical techniques; 2. Keep specific log or history data sets; 3. Assign certain functions to different modules; 4. Restrict communications between some areas of the program; 5. Check data integrity for critical variables."
      }
    },
    {
      "data": {
        "id": "Section_f365d8edbfdbac9b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Maintainability",
        "heading": "Maintainability",
        "body": "This should specify attributes of software that relate to the ease of maintenance of the software itself. There may be some requirement for certain modularity, interfaces, complexity, etc. Requirements should not be placed here just because they are thought to be good design practices."
      }
    },
    {
      "data": {
        "id": "Section_eeb970b7be0549ab",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Portability",
        "heading": "Portability",
        "body": "This should specify attributes of software that relate to the ease of porting the software to other host machines and/or operating systems. This may include the following: 1. Percentage of components with host-dependent code; 2. Percentage of code that is host dependent; 3. Use of a proven portable language; 4. Use of a particular compiler or language subset; 5. Use of a particular operating system."
      }
    },
    {
      "data": {
        "id": "Section_cb96426546d855af",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Organizing the speciic requirements",
        "heading": "Organizing the speciic requirements",
        "body": "For anything but trivial systems the detailed requirements tend to be extensive. For this reason, it is recom-mended that careful consideration be given to organizing these in a manner optimal for understanding. There is no one optimal organization for all systems. Different classes of systems lend themselves to different orga-nizations of requirements in Section 3 of the SRS. Some of these organizations are described in 5.3.7.1 through 5.3.7.7."
      }
    },
    {
      "data": {
        "id": "Section_4a19f97191866007",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "System mode",
        "heading": "System mode",
        "body": "Some systems behave quite differently depending on the mode of operation. For example, a control system may have different sets of functions depending on its mode: training, normal, or emergency. When organiz-ing this section by mode, the outline in A.1 or A.2 should be used. The choice depends on whether interfaces and performance are dependent on mode."
      }
    },
    {
      "data": {
        "id": "Section_779201f956b68908",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "User class",
        "heading": "User class",
        "body": "Some systems provide different sets of functions to different classes of users. For example, an elevator control system presents different capabilities to passengers, maintenance workers, and fire fighters. When organizing this section by user class, the outline in A.3 should be used."
      }
    },
    {
      "data": {
        "id": "Section_942ecacfb70c295f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Objects",
        "heading": "Objects",
        "body": "Objects are real-world entities that have a counterpart within the system. For example, in a patient monitor-ing system, objects include patients, sensors, nurses, rooms, physicians, medicines, etc. Associated with each object is a set of attributes (of that object) and functions (performed by that object). These functions are also called services, methods, or processes. When organizing this section by object, the outline in A.4 should be used. Note that sets of objects may share attributes and services. These are grouped together as classes."
      }
    },
    {
      "data": {
        "id": "Section_fb4ed5387eacb2af",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Feature",
        "heading": "Feature",
        "body": "A feature is an externally desired service by the system that may require a sequence of inputs to effect the desired result. For example, in a telephone system, features include local call, call forwarding, and confer-ence call. Each feature is generally described in a sequence of stimulus-response pairs. When organizing this section by feature, the outline in A.5 should be used."
      }
    },
    {
      "data": {
        "id": "Section_caa99e3b571a2af3",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Stimulus",
        "heading": "Stimulus",
        "body": "Some systems can be best organized by describing their functions in terms of stimuli. For example, the func-tions of an automatic aircraft landing system may be organized into sections for loss of power, wind shear, sudden change in roll, vertical velocity excessive, etc. When organizing this section by stimulus, the outline in A.6 should be used."
      }
    },
    {
      "data": {
        "id": "Section_0c73f42d1ba4c022",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Response",
        "heading": "Response",
        "body": "Some systems can be best organized by describing all the functions in support of the generation of a response. For example, the functions of a personnel system may be organized into sections corresponding to all functions associated with generating paychecks, all functions associated with generating a current list of employees, etc. The outline in A.6 (with all occurrences of stimulus replaced with response) should be used."
      }
    },
    {
      "data": {
        "id": "Section_917f2a54c3c75d60",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Functional hierarchy",
        "heading": "Functional hierarchy",
        "body": "When none of the above organizational schemes prove helpful, the overall functionality can be organized into a hierarchy of functions organized by either common inputs, common outputs, or common internal data access. Data flow diagrams and data dictionaries can be used to show the relationships between and among the functions and data. When organizing this section by functional hierarchy, the outline in A.7 should be used."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_a879edeaea34cea3",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Any additional requirements may be put in a separate section at the end of the SRS.",
        "modality": "may"
      }
    },
    {
      "data": {
        "id": "Section_5bcc434a6daca2aa",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Additional comments",
        "heading": "Additional comments",
        "body": "Whenever a new SRS is contemplated, more than one of the organizational techniques given in 5.3.7.7 may be appropriate. In such cases, organize the specific requirements for multiple hierarchies tailored to the specific needs of the system under specification. For example, see A.8 for an organization combining user class and feature. Any additional requirements may be put in a separate section at the end of the SRS. There are many notations, methods, and automated support tools available to aid in the documentation of requirements. For the most part, their usefulness is a function of organization. For example, when organizing by mode, finite state machines or state charts may prove helpful; when organizing by object, object-oriented analysis may prove helpful; when organizing by feature, stimulus-response sequences may prove helpful; and when organizing by functional hierarchy, data flow diagrams and data dictionaries may prove helpful. In any of the outlines given in A.1 through A.8, those sections called \"Functional Requirement i \" may be described in native language (e.g., English), in pseudocode, in a system definition language, or in four sub-sections titled: Introduction, Inputs, Processing, and Outputs."
      }
    },
    {
      "data": {
        "id": "Section_66cb36506c3026ed",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Supporting information",
        "heading": "Supporting information",
        "body": "The supporting information makes the SRS easier to use. It includes the following: 1. Table of contents; 2. Index; 3. Appendixes."
      }
    },
    {
      "data": {
        "id": "Section_ab132851b978cb2b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Table of contents and index",
        "heading": "Table of contents and index",
        "body": "The table of contents and index are quite important and should follow general compositional practices."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_7bd499088701df49",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "They may include Sample input/output formats, descriptions of cost analysis studies, or results of user surveys; Supporting or background information that can help the readers of the SRS; A description of the problems to be solved by the software; Special packaging instructions for the code and the media to meet security, export, initial loading, or other requirements.",
        "modality": "may"
      }
    },
    {
      "data": {
        "id": "Section_51a6ed7eb9fb0b32",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Appendixes",
        "heading": "Appendixes",
        "body": "The appendixes are not always considered part of the actual SRS and are not always necessary. They may include 1. Sample input/output formats, descriptions of cost analysis studies, or results of user surveys; 2. Supporting or background information that can help the readers of the SRS; 3. A description of the problems to be solved by the software; 4. Special packaging instructions for the code and the media to meet security, export, initial loading, or other requirements. When appendixes are included, the SRS should explicitly state whether or not the appendixes are to be considered part of the requirements."
      }
    },

    {
      "data": {
        "id": "Section_569bd1fe125dced7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Scope and purpose",
        "heading": "Scope and purpose",
        "body": "Both IEEE Std 830-1998 and IEEE/EIA 12207.1-1997 place requirements on a Software Requirements Description Document. The purpose of this annex is to explain the relationship between the two sets of requirements so that users producing documents intended to comply with both standards may do so."
      }
    },
    {
      "data": {
        "id": "Section_8f7d12d5439de8d4",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Correlation",
        "heading": "Correlation",
        "body": "This clause explains the relationship between IEEE Std 830-1998 and IEEE/EIA 12207.0-1996 and IEEE/ EIA 12207.1-1997 in the following areas: terminology, process, and life cycle data."
      }
    },
    {
      "data": {
        "id": "Section_8f6f9d3b4e82f9e8",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Terminology correlation",
        "heading": "Terminology correlation",
        "body": "Both this recommended practice and IEEE/EIA 12207.0-1996 have similar semantics for the key terms of software, requirements, specification, supplier, developer, and maintainer. This recommended practice uses the term \"customer\" where IEEE/EIA 12207.0-1996 uses \"acquirer,\" and this recommended practice uses \"user\" where IEEE/EIA 12207.0-1996 uses \"operator.\""
      }
    },
    {
      "data": {
        "id": "Section_58e5edd69079baac",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Process correlation",
        "heading": "Process correlation",
        "body": "IEEE/EIA 12207.0-1996 uses a process-oriented approach for describing the definition of a set of require-ments for software. This recommended practice uses a product-oriented approach, where the product is a Software Requirements Description (SRD). There are natural process steps, namely the steps to create each portion of the SRD. These may be correlated with the process requirements of IEEE/EIA 12207.0-1996. The difference is that this recommended practice is focused on the development of software requirements whereas IEEE/EIA 12207.0-1996 provides an overall life cycle view and mentions Software Requirements Analysis as part of its Development Process. This recommended practice provides a greater level of detail on what is involved in the preparation of an SRD."
      }
    },
    {
      "data": {
        "id": "Section_c2408900ba2c7379",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Life cycle data correlation",
        "heading": "Life cycle data correlation",
        "body": "IEEE/EIA 12207.0-1996 takes the viewpoint that the software requirements are derived from the system requirements. Therefore, it uses the term, \"description\" rather that \"specification\" to describe the software requirements. In a system in which software is a component, each requiring its own specification, there would be a System Requirements Specification (SRS) and one or more SRDs. If the term Software Require-ments Specification had been used, there would be a confusion between an SRS referring to the system or software requirements. In the case where there is a stand-alone software system, IEEE/EIA 12207.1-1997 states \"If the software is a stand-alone system, then this document should be a specification.\""
      }
    },
    {
      "data": {
        "id": "Section_e47389f7170fbf91",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Content mapping",
        "heading": "Content mapping",
        "body": "This clause provides details bearing on a claim that an SRS complying with this recommended practice would also achieve \"document compliance\" with the SRD described in IEEE/EIA 12207.1-1997. The requirements for document compliance are summarized in a single row of Table 1 of IEEE/EIA 12207.1-1997. That row is reproduced in Table B.1 of this recommended practice. The requirements for document compliance are discussed in the following subclauses: - B.3.1 discusses compliance with the information requirements noted in column 2 of Table B.1 as prescribed by 5.1.1.4, 5.3.4.1, and 5.3.4.2 of IEEE/EIA 12207.0-1996. - B.3.2 discusses compliance with the generic content guideline (the \"kind\" of document) noted in column 3 of Table B.1 as a \"description\". The generic content guidelines for a \"description\" appear in 5.1 of IEEE/EIA 12207.1-1997. - B.3.3 discusses compliance with the specific requirements for a Software Requirements Description noted in column 4 of Table B.1 as prescribed by 6.22 of IEEE/EIA 12207.1-1997. - B.3.4 discusses compliance with the life cycle data objectives of Annex H of IEEE/EIA 12207.0-1996 as described in 4.2 of IEEE/EIA 12207.1-1997."
      }
    },
    {
      "data": {
        "id": "Section_56c59b6238948b37",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Compliance with information requirements of IEEE/EIA 12207.0-1996",
        "heading": "Compliance with information requirements of IEEE/EIA 12207.0-1996",
        "body": "The information requirements for an SRD are those prescribed by 5.1.1.4, 5.3.4.1, and 5.3.4.2 of IEEE/EIA 12207.0-1996. The requirements are substantively identical to those considered in B.3.3 of this recom-mended practice."
      }
    },
    {
      "data": {
        "id": "Section_a737b7e75103ecfb",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Compliance with generic content guidelines of IEEE/EIA 12207.1-1997",
        "heading": "Compliance with generic content guidelines of IEEE/EIA 12207.1-1997",
        "body": "According to IEEE/EIA 12207.1-1997, the generic content guideline for an SRD is generally a description, as prescribed by 5.1 of IEEE/EIA 12207.1-1997. A complying description shall achieve the purpose stated in 5.1.1 and include the information listed in 5.1.2 of IEEE/EIA 12207.1-1997. The purpose of a description is: IEEE/EIA 12207.1-1997, subclause 5.1.1: Purpose: Describe a planned or actual function, design, performance, or process. An SRD complying with this recommended practice would achieve the stated purpose. Any description or specification complying with IEEE/EIA 12207.1-1997 shall satisfy the generic content requirements provided in 5.1.2 of that standard. Table B.2 of this recommended practice lists the generic content items and, where appropriate, references the clause of this recommended practice that requires the same information."
      }
    },
    {
      "data": {
        "id": "Section_99d62f854317ccd9",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Compliance with speciic content requirements of IEEE/EIA 12207.1-1997",
        "heading": "Compliance with speciic content requirements of IEEE/EIA 12207.1-1997",
        "body": "The specific content requirements for an SRD in IEEE/EIA 12207.1-1997 are prescribed by 6.22 of IEEE/ EIA 12207.1-1997. A compliant SRD shall achieve the purpose stated in 6.22.1 of IEEE/EIA 12207.1-1997. The purpose of the SRD is: IEEE/EIA 12207.1-1997, subclause 6.22.1: Purpose: Specify the requirements for a soft-ware item and the methods to be used to ensure that each requirement has been met. Used as the basis for design and qualification testing of a software item. An SRS complying with this recommended practice and meeting the additional requirements of Table B.3 of this recommended practice would achieve the stated purpose. An SRD compliant with IEEE/EIA 12207.1-1997 shall satisfy the specific content requirements provided in 6.22.3 and 6.22.4 of that standard. Table B.3 of this recommended practice lists the specific content items and, where appropriate, references the clause of this recommended practice that requires the same informa-tion. An SRD specified according the requirements stated or referenced in Table B.3 of this recommended prac-tice shall be evaluated considering the criteria provided in 5.3.4.2 of IEEE/EIA 12207.0-1996."
      }
    },
    {
      "data": {
        "id": "Section_c05a21e1d339c8cb",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Compliance with life cycle data objectives",
        "heading": "Compliance with life cycle data objectives",
        "body": "In addition to the content requirements, life cycle data shall be managed in accordance with the objectives provided in Annex H of IEEE/EIA 12207.0-1996."
      }
    },
    {
      "data": {
        "id": "Section_1a23e1bb009b9d61",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Conclusion",
        "heading": "Conclusion",
        "body": "The analysis suggests that any SRS complying with this recommended practice and the additions shown in Table B.2 and Table B.3 also complies with the requirements of an SRD in IEEE/EIA 12207.1-1997. In addition, to comply with IEEE/EIA 12207.1-1997, an SRS shall support the life cycle data objectives of Annex H of IEEE/EIA 12207.0-1996."
      }
    },

    {
      "data": {
        "id": "IEEE830Standard_1628b6a03f5e1f91",
        "label": "IEEE830Standard",
        "type": "entity",
        "__class__": "IEEE830Standard",
        "standard_id_or_title": "IEEE Std 830-1998",
        "metadata": {
          "title": "IEEE Recommended Practice for Software Requirements Specifications",
          "standard_id": "IEEE Std 830-1998",
          "revision_of": "IEEE Std 830-1993",
          "sponsor": "Software Engineering Standards Committee of the IEEE Computer Society",
          "approved_date": "1998-06-25",
          "abstract": "The content and qualities of a good software requirements specification (SRS) are de-scribed and several sample SRS outlines are presented. This recommended practice is aimed at specifying requirements of software to be developed but also can be applied to assist in the selec-tion of in-house and commercial software products. Guidelines for compliance with IEEE/EIA 12207.1-1997 are also provided.",
          "keywords": [
            "contract",
            "customer",
            "prototyping",
            "software requirements specification",
            "supplier",
            "system requirements specifications"
          ]
        }
      }
    }

        /* Generate color per node label */
        const NODE_COLOR_PALETTE = [
            '#4e79a7', '#f28e2c', '#e15759', '#76b7b2', '#59a14f', 
            '#edc949', '#af7aa1', '#ff9da7', '#9c755f', '#bab0ab'
        ];
        const labelColorMap = new Map();
        let colorIndex = 0;

        function stringToColor(str) {
          const key = String(str);
          if (labelColorMap.has(key)) {
            return labelColorMap.get(key);
          }

          // Assign the next color from the palette
          const color = NODE_COLOR_PALETTE[colorIndex % NODE_COLOR_PALETTE.length];
          labelColorMap.set(key, color);
          colorIndex++;
          return color;
        }

        /* Count by label, with fallbacks */
        function calculateNodeTypeStats(elements) {
          const counts = {};
          (elements.nodes || []).forEach(node => {
            const d = node.data || {};
            let labels = [];
            if (Array.isArray(d.labels)) {
              labels = d.labels.map(String).filter(Boolean);
            } else if (typeof d.labels === 'string') {
              const parts = d.labels.split(/[|,]/).map(s => s.trim()).filter(Boolean);
              if (parts.length) labels = parts;
              else if (d.labels.includes(':') && !d.labels.trim().startsWith('http')) {
                labels = d.labels.split(':').filter(Boolean);
              } else {
                labels = [d.labels];
              }
            }
            if (labels.length) {
              labels.forEach(l => { counts[l] = (counts[l] || 0) + 1; });
              return;
            }
            const key = d.label || d.node_label || d.node_type || d.type || d.category || d.class || d.kind || 'Unknown';
            counts[key] = (counts[key] || 0) + 1;
          });
          return counts;
        }

        // Display node type statistics
        function displayNodeTypeStats(nodeTypes) {
            const nodeTypesList = document.getElementById('node-types-list');
            const sortedTypes = Object.entries(nodeTypes).sort((a, b) => b[1] - a[1]);

            nodeTypesList.innerHTML = sortedTypes.map(([type, count]) => {
                // Use the 'Unknown' key for the default color if type is null/undefined
                const colorKey = type === 'null' || type === 'undefined' ? 'Unknown' : type;
                const color = stringToColor(String(colorKey));
                
                // This is the part that creates the colored circle legend
                return `<div class="node-type-item" style="display: flex; align-items: center; margin-bottom: 4px;">
                            <span style="background-color: ${color}; width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; flex-shrink: 0;"></span>
                            <span>${type} - ${count}</span>
                        </div>`;
            }).join('');

            // Show info panel

            let html = '<div style="margin-bottom: 8px; font-weight: 600; color: #e2e8f0;">📍 Node Details</div>';
            for (const [key, value] of Object.entries(data)) {
                if (value != null && value !== '') {
                    // Properly serialize objects and arrays
                    let displayValue;
                    if (typeof value === 'object') {
                        displayValue = JSON.stringify(value, null, 2);
                        // Truncate if too long
                        if (displayValue.length > 200) {
                            displayValue = displayValue.substring(0, 200) + '...';
                        }
                        // Wrap in <pre> for formatting
                        displayValue = `<pre style="margin: 4px 0; padding: 8px; background: #1e2428; border-radius: 4px; font-size: 11px; overflow-x: auto; max-width: 100%;">${displayValue}</pre>`;

                        displayValue = String(value).length > 100
                            ? String(value).substring(0, 100) + '...'
                            : value;
                    }
                    html += `<div class="info-item"><span class="info-label">${key}:</span> ${displayValue}</div>`;
                }
            }

            infoContent.innerHTML = html;
            infoPanel.classList.add('active');
        });

        // Edge click handler - show details and highlight

            cy.elements().removeClass('highlighted faded');

            for (const [key, value] of Object.entries(data)) {

                    // Properly serialize objects and arrays
