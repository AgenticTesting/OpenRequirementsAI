        "id": "Section_c873a6be59692440",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.1",
        "heading": "External interfaces",
        "body": "This should be a detailed description of all inputs into and outputs from the software system. It should complement the interface descriptions in 5.2 and should not repeat information there. It should include both content and format as follows: 1. Name of item; 2. Description of purpose; 3. Source of input or destination of output; 4. Valid range, accuracy, and/or tolerance; 5. Units of measure; 6. Timing; 7. Relationships to other inputs/outputs; 8. Screen formats/organization; 9. Window formats/organization; 10. Data formats; 11. Command formats; 12. End messages."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_1333c760ce8856e3",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Functional requirements should define the fundamental actions that must take place in the software in accepting and processing the inputs and in processing and generating the outputs.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_7462d3d7a0ee4458",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "the fundamental actions that must take place in the software",
        "modality": "must"
      }
    },
    {
      "data": {
        "id": "Section_a5296f56f74fcebd",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.2",
        "heading": "Functions",
        "body": "Functional requirements should define the fundamental actions that must take place in the software in accepting and processing the inputs and in processing and generating the outputs. These are generally listed as \"shall\" statements starting with \"The system shall.\" These include 1. Validity checks on the inputs 2. Exact sequence of operations 3. Responses to abnormal situations, including 1. Overflow 2. Communication facilities 3. Error handling and recovery 4. Effect of parameters 5. Relationship of outputs to inputs, including 1. Input/output sequences 2. Formulas for input to output conversion It may be appropriate to partition the functional requirements into subfunctions or subprocesses. This does not imply that the software design will also be partitioned that way."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_567de814b97a7aef",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should specify both the static and the dynamic numerical requirements placed on the soft-ware or on human interaction with the software as a whole.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c5b7677f26d9bfc1",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "All of these requirements should be stated in measurable terms.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_a616594521b8d163",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "95% oj the transactions shall be processed in less than J s.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_fc31edf534a62c1b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "An operator shall not have to wait jor the transaction to complete.",
        "modality": "shall not"
      }
    },
    {
      "data": {
        "id": "Section_8882f471663df056",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.3",
        "heading": "Performance requirements",
        "body": "This subsection should specify both the static and the dynamic numerical requirements placed on the soft-ware or on human interaction with the software as a whole. Static numerical requirements may include the following: 1. The number of terminals to be supported; 2. The number of simultaneous users to be supported; 3. Amount and type of information to be handled. Static numerical requirements are sometimes identified under a separate section entitled Capacity. Dynamic numerical requirements may include, for example, the numbers of transactions and tasks and the amount of data to be processed within certain time periods for both normal and peak workload conditions. All of these requirements should be stated in measurable terms. For example, 95% oj the transactions shall be processed in less than J s. rather than, An operator shall not have to wait jor the transaction to complete. NOTE-Numerical limits applied to one specific function are normally specified as part of the processing subparagraph description of that function."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_10b537bff3b275bf",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the logical requirements for any information that is to be placed into a database.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_1b039ef40be591f5",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.4",
        "heading": "Logical database requirements",
        "body": "This should specify the logical requirements for any information that is to be placed into a database. This may include the following: 1. Types of information used by various functions; 2. Frequency of use; 3. Accessing capabilities; 4. Data entities and their relationships; 5. Integrity constraints; 6. Data retention requirements."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2c778f590b3137cd",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify design constraints that can be imposed by other standards, hardware limitations, etc.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_379c9d7a349bdb0c",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.5",
        "heading": "Design constraints",
        "body": "This should specify design constraints that can be imposed by other standards, hardware limitations, etc."
      }
    },
    {
      "data": {
        "id": "Section_1506a8b287c91e81",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.6",
        "heading": "Software system attributes",
        "body": "There are a number of attributes of software that can serve as requirements. It is important that required attributes be specified so that their achievement can be objectively verified. Subclauses 5.3.6.1 through 5.3.6.5 provide a partial list of examples."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2ff947199b3b2428",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the factors required to establish the required reliability of the software system at time of delivery.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_d9154b7c0742e9a9",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.6.1",
        "heading": "Reliability",
        "body": "This should specify the factors required to establish the required reliability of the software system at time of delivery."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_72e23cea3c00700d",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the factors required to guarantee a defined availability level for the entire system such as checkpoint, recovery, and restart.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_fc6a8caae9b021c1",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.6.2",
        "heading": "Availability",
        "body": "This should specify the factors required to guarantee a defined availability level for the entire system such as checkpoint, recovery, and restart."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_d19bf9576c476ac5",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the factors that protect the software from accidental or malicious access, use, modifica-tion, destruction, or disclosure.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_953afc8045474199",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.6.3",
        "heading": "Security",
        "body": "This should specify the factors that protect the software from accidental or malicious access, use, modifica-tion, destruction, or disclosure. Specific requirements in this area could include the need to 1. Utilize certain cryptographical techniques; 2. Keep specific log or history data sets; 3. Assign certain functions to different modules; 4. Restrict communications between some areas of the program; 5. Check data integrity for critical variables."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_cfa45142f7506da0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify attributes of software that relate to the ease of maintenance of the software itself.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_dc1a8060dc2c12c1",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Requirements should not be placed here just because they are thought to be good design practices.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "Section_741f62a98d3e6fd5",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.6.4",
        "heading": "Maintainability",
        "body": "This should specify attributes of software that relate to the ease of maintenance of the software itself. There may be some requirement for certain modularity, interfaces, complexity, etc. Requirements should not be placed here just because they are thought to be good design practices."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_226fb7cf568b6dda",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify attributes of software that relate to the ease of porting the software to other host machines and/or operating systems.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_2906640766ac9066",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.6.5",
        "heading": "Portability",
        "body": "This should specify attributes of software that relate to the ease of porting the software to other host machines and/or operating systems. This may include the following: 1. Percentage of components with host-dependent code; 2. Percentage of code that is host dependent; 3. Use of a proven portable language; 4. Use of a particular compiler or language subset; 5. Use of a particular operating system."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_03aa4f4539c4f39c",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "it is recom-mended that careful consideration be given to organizing these in a manner optimal for understanding.",
        "modality": "recommended"
      }
    },
    {
      "data": {
        "id": "Section_c89d00ef9a53b3a0",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7",
        "heading": "Organizing the speciic requirements",
        "body": "For anything but trivial systems the detailed requirements tend to be extensive. For this reason, it is recom-mended that careful consideration be given to organizing these in a manner optimal for understanding. There is no one optimal organization for all systems. Different classes of systems lend themselves to different orga-nizations of requirements in Section 3 of the SRS. Some of these organizations are described in 5.3.7.1 through 5.3.7.7."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_033f1beb962e6790",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When organiz-ing this section by mode, the outline in A.1 or A.2 should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_e52099961924cfc7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.1",
        "heading": "System mode",
        "body": "Some systems behave quite differently depending on the mode of operation. For example, a control system may have different sets of functions depending on its mode: training, normal, or emergency. When organiz-ing this section by mode, the outline in A.1 or A.2 should be used. The choice depends on whether interfaces and performance are dependent on mode."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_dc9458af4552711a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When organizing this section by user class, the outline in A.3 should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_86e14decbe2a1bed",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.2",
        "heading": "User class",
        "body": "Some systems provide different sets of functions to different classes of users. For example, an elevator control system presents different capabilities to passengers, maintenance workers, and fire fighters. When organizing this section by user class, the outline in A.3 should be used."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6b74c044ab80e2bb",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When organizing this section by object, the outline in A.4 should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_1e43f056bd352ffb",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.3",
        "heading": "Objects",
        "body": "Objects are real-world entities that have a counterpart within the system. For example, in a patient monitor-ing system, objects include patients, sensors, nurses, rooms, physicians, medicines, etc. Associated with each object is a set of attributes (of that object) and functions (performed by that object). These functions are also called services, methods, or processes. When organizing this section by object, the outline in A.4 should be used. Note that sets of objects may share attributes and services. These are grouped together as classes."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6fee98c9f01b9423",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When organizing this section by feature, the outline in A.5 should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_50639fe884016197",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.4",
        "heading": "Feature",
        "body": "A feature is an externally desired service by the system that may require a sequence of inputs to effect the desired result. For example, in a telephone system, features include local call, call forwarding, and confer-ence call. Each feature is generally described in a sequence of stimulus-response pairs. When organizing this section by feature, the outline in A.5 should be used."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_cc791f562e579eee",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When organizing this section by stimulus, the outline in A.6 should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_2466e406018a1404",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.5",
        "heading": "Stimulus",
        "body": "Some systems can be best organized by describing their functions in terms of stimuli. For example, the func-tions of an automatic aircraft landing system may be organized into sections for loss of power, wind shear, sudden change in roll, vertical velocity excessive, etc. When organizing this section by stimulus, the outline in A.6 should be used."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b940bfaeebe424c4",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The outline in A.6 (with all occurrences of stimulus replaced with response) should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_3271bcd49882bf6b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.6",
        "heading": "Response",
        "body": "Some systems can be best organized by describing all the functions in support of the generation of a response. For example, the functions of a personnel system may be organized into sections corresponding to all functions associated with generating paychecks, all functions associated with generating a current list of employees, etc. The outline in A.6 (with all occurrences of stimulus replaced with response) should be used."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_4c9f61517347050b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When organizing this section by functional hierarchy, the outline in A.7 should be used.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_39275bc4c40e29ba",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.7.7",
        "heading": "Functional hierarchy",
        "body": "When none of the above organizational schemes prove helpful, the overall functionality can be organized into a hierarchy of functions organized by either common inputs, common outputs, or common internal data access. Data flow diagrams and data dictionaries can be used to show the relationships between and among the functions and data. When organizing this section by functional hierarchy, the outline in A.7 should be used."
      }
    },
    {
      "data": {
        "id": "Section_8ab666eacd1ff54d",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3.8",
        "heading": "Additional comments",
        "body": "Whenever a new SRS is contemplated, more than one of the organizational techniques given in 5.3.7.7 may be appropriate. In such cases, organize the specific requirements for multiple hierarchies tailored to the specific needs of the system under specification. For example, see A.8 for an organization combining user class and feature. Any additional requirements may be put in a separate section at the end of the SRS. There are many notations, methods, and automated support tools available to aid in the documentation of requirements. For the most part, their usefulness is a function of organization. For example, when organizing by mode, finite state machines or state charts may prove helpful; when organizing by object, object-oriented analysis may prove helpful; when organizing by feature, stimulus-response sequences may prove helpful; and when organizing by functional hierarchy, data flow diagrams and data dictionaries may prove helpful. In any of the outlines given in A.1 through A.8, those sections called \"Functional Requirement i \" may be described in native language (e.g., English), in pseudocode, in a system definition language, or in four sub-sections titled: Introduction, Inputs, Processing, and Outputs."
      }
    },
    {
      "data": {
        "id": "Section_41592aa5896c4614",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.4",
        "heading": "Supporting information",
        "body": "The supporting information makes the SRS easier to use. It includes the following: 1. Table of contents; 2. Index; 3. Appendixes."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2c3310c570f38c91",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The table of contents and index are quite important and should follow general compositional practices.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_24390b03d5ec8346",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.4.1",
        "heading": "Table of contents and index",
        "body": "The table of contents and index are quite important and should follow general compositional practices."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_df936efa9ee86ede",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When appendixes are included, the SRS should explicitly state whether or not the appendixes are to be considered part of the requirements.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_0421d21858104c4b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.4.2",
        "heading": "Appendixes",
        "body": "The appendixes are not always considered part of the actual SRS and are not always necessary. They may include 1. Sample input/output formats, descriptions of cost analysis studies, or results of user surveys; 2. Supporting or background information that can help the readers of the SRS; 3. A description of the problems to be solved by the software; 4. Special packaging instructions for the code and the media to meet security, export, initial loading, or other requirements. When appendixes are included, the SRS should explicitly state whether or not the appendixes are to be considered part of the requirements."
      }
    },

      }

    {
      "data": {
        "id": "Reference_0b7fa8de8b390e9f",
        "label": "Reference",
        "type": "entity",
        "__class__": "Reference",
        "citation": "IEEE/EIA 12207.2-1997, IEEE/EIA Guide for Information Technology-Software life cycle pro-cesses-Implementation considerations"
      }
    },
    {
      "data": {
        "id": "Reference_a119be596bdd2282",
        "label": "Reference",
        "type": "entity",
        "__class__": "Reference",
        "citation": "IEEE Stds 730, 828, 829, 830, 1012, 1016, 1058, 1062, 1219, 1233, 1362"
      }
    },
    {
      "data": {
        "id": "Section_66446eba624556f1",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.1",
        "heading": "Overview",
        "body": "The Software Engineering Standards Committee (SESC) of the IEEE Computer Society has endorsed the policy of adopting international standards. In 1995, the international standard, ISO/IEC 12207, Information technology-Software life cycle processes, was completed. The standard establishes a common framework for software life cycle processes, with well-defined terminology, that can be referenced by the software industry. In 1995 the SESC evaluated ISO/IEC 12207 and decided that the standard should be adopted and serve as the basis for life cycle processes within the IEEE Software Engineering Collection. The IEEE adaptation of ISO/IEC 12207 is IEEE/EIA 12207.0-1996. It contains ISO/IEC 12207 and the following additions: improved compliance approach, life cycle process objectives, life cycle data objectives, and errata. The implementation of ISO/IEC 12207 within the IEEE also includes the following: - IEEE/EIA 12207.1-1997, IEEE/EIA Guide for Information Technology-Software life cycle pro-cesses-Life cycle data; - IEEE/EIA 12207.2-1997, IEEE/EIA Guide for Information Technology-Software life cycle pro-cesses-Implementation considerations; and - Additions to 11 SESC standards (i.e., IEEE Stds 730, 828, 829, 830, 1012, 1016, 1058, 1062, 1219, 1233, 1362) to define the correlation between the data produced by existing SESC standards and the data produced by the application of IEEE/EIA 12207.1-1997. NOTE-Although IEEE/EIA 12207.1-1997 is a guide, it also contains provisions for application as a standard with spe-cific compliance requirements. This annex treats 12207.1-1997 as a standard."
      }
    },
    {
      "data": {
        "id": "Reference_203d1294785b9aa8",
        "label": "Reference",
        "type": "entity",
        "__class__": "Reference",
        "citation": "IEEE Std 830-1998"
      }
    },
    {
      "data": {
        "id": "Reference_f803c5e680f3c036",
        "label": "Reference",
        "type": "entity",
        "__class__": "Reference",
        "citation": "IEEE/EIA 12207.1-1997"
      }
    },
    {
      "data": {
        "id": "Section_3283de0f1b623630",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.2",
        "heading": "Scope and purpose",
        "body": "Both IEEE Std 830-1998 and IEEE/EIA 12207.1-1997 place requirements on a Software Requirements Description Document. The purpose of this annex is to explain the relationship between the two sets of requirements so that users producing documents intended to comply with both standards may do so."
      }
    },
    {
      "data": {
        "id": "Section_5680b7128f6519b2",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.3",
        "heading": "Correlation",
        "body": "This clause explains the relationship between IEEE Std 830-1998 and IEEE/EIA 12207.0-1996 and IEEE/ EIA 12207.1-1997 in the following areas: terminology, process, and life cycle data."
      }
    },
    {
      "data": {
        "id": "Section_f44c1fcfa99d27f3",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.3.1",
        "heading": "Terminology correlation",
        "body": "Both this recommended practice and IEEE/EIA 12207.0-1996 have similar semantics for the key terms of software, requirements, specification, supplier, developer, and maintainer. This recommended practice uses the term \"customer\" where IEEE/EIA 12207.0-1996 uses \"acquirer,\" and this recommended practice uses \"user\" where IEEE/EIA 12207.0-1996 uses \"operator.\""
      }
    },
    {
      "data": {
        "id": "Section_2fa30ab196754fad",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.3.2",
        "heading": "Process correlation",
        "body": "IEEE/EIA 12207.0-1996 uses a process-oriented approach for describing the definition of a set of require-ments for software. This recommended practice uses a product-oriented approach, where the product is a Software Requirements Description (SRD). There are natural process steps, namely the steps to create each portion of the SRD. These may be correlated with the process requirements of IEEE/EIA 12207.0-1996. The difference is that this recommended practice is focused on the development of software requirements whereas IEEE/EIA 12207.0-1996 provides an overall life cycle view and mentions Software Requirements Analysis as part of its Development Process. This recommended practice provides a greater level of detail on what is involved in the preparation of an SRD."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_f5c85f2e853fe199",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "If the software is a stand-alone system, then this document should be a specification.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_d22bca9d79166bda",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.3.3",
        "heading": "Life cycle data correlation",
        "body": "IEEE/EIA 12207.0-1996 takes the viewpoint that the software requirements are derived from the system requirements. Therefore, it uses the term, \"description\" rather that \"specification\" to describe the software requirements. In a system in which software is a component, each requiring its own specification, there would be a System Requirements Specification (SRS) and one or more SRDs. If the term Software Require-ments Specification had been used, there would be a confusion between an SRS referring to the system or software requirements. In the case where there is a stand-alone software system, IEEE/EIA 12207.1-1997 states \"If the software is a stand-alone system, then this document should be a specification.\""
      }
    },
    {
      "data": {
        "id": "Section_51cc7fa2815863ab",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.4",
        "heading": "Content mapping",
        "body": "This clause provides details bearing on a claim that an SRS complying with this recommended practice would also achieve \"document compliance\" with the SRD described in IEEE/EIA 12207.1-1997. The requirements for document compliance are summarized in a single row of Table 1 of IEEE/EIA 12207.1-1997. That row is reproduced in Table B.1 of this recommended practice. The requirements for document compliance are discussed in the following subclauses: - B.3.1 discusses compliance with the information requirements noted in column 2 of Table B.1 as prescribed by 5.1.1.4, 5.3.4.1, and 5.3.4.2 of IEEE/EIA 12207.0-1996. - B.3.2 discusses compliance with the generic content guideline (the \"kind\" of document) noted in column 3 of Table B.1 as a \"description\". The generic content guidelines for a \"description\" appear in 5.1 of IEEE/EIA 12207.1-1997. - B.3.3 discusses compliance with the specific requirements for a Software Requirements Description noted in column 4 of Table B.1 as prescribed by 6.22 of IEEE/EIA 12207.1-1997. - B.3.4 discusses compliance with the life cycle data objectives of Annex H of IEEE/EIA 12207.0-1996 as described in 4.2 of IEEE/EIA 12207.1-1997."
      }
    },
    {
      "data": {
        "id": "Section_3cf9d36a8ae66426",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.4.1",
        "heading": "Compliance with information requirements of IEEE/EIA 12207.0-1996",
        "body": "The information requirements for an SRD are those prescribed by 5.1.1.4, 5.3.4.1, and 5.3.4.2 of IEEE/EIA 12207.0-1996. The requirements are substantively identical to those considered in B.3.3 of this recom-mended practice."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_8764638da6a714ab",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "A complying description shall achieve the purpose stated in 5.1.1 and include the information listed in 5.1.2 of IEEE/EIA 12207.1-1997.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b241bb75322f9c44",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Any description or specification complying with IEEE/EIA 12207.1-1997 shall satisfy the generic content requirements provided in 5.1.2 of that standard.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "Section_a08b6af1d71fc6eb",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.4.2",
        "heading": "Compliance with generic content guidelines of IEEE/EIA 12207.1-1997",
        "body": "According to IEEE/EIA 12207.1-1997, the generic content guideline for an SRD is generally a description, as prescribed by 5.1 of IEEE/EIA 12207.1-1997. A complying description shall achieve the purpose stated in 5.1.1 and include the information listed in 5.1.2 of IEEE/EIA 12207.1-1997. The purpose of a description is: IEEE/EIA 12207.1-1997, subclause 5.1.1: Purpose: Describe a planned or actual function, design, performance, or process. An SRD complying with this recommended practice would achieve the stated purpose. Any description or specification complying with IEEE/EIA 12207.1-1997 shall satisfy the generic content requirements provided in 5.1.2 of that standard. Table B.2 of this recommended practice lists the generic content items and, where appropriate, references the clause of this recommended practice that requires the same information."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_409c7eb510ebdee4",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "A compliant SRD shall achieve the purpose stated in 6.22.1 of IEEE/EIA 12207.1-1997.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_87f904554e93b8ef",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "An SRD compliant with IEEE/EIA 12207.1-1997 shall satisfy the specific content requirements provided in 6.22.3 and 6.22.4 of that standard.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_1a8141138352bb90",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "An SRD specified according the requirements stated or referenced in Table B.3 of this recommended prac-tice shall be evaluated considering the criteria provided in 5.3.4.2 of IEEE/EIA 12207.0-1996.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "Section_0a114963493b05e9",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.4.3",
        "heading": "Compliance with speciic content requirements of IEEE/EIA 12207.1-1997",
        "body": "The specific content requirements for an SRD in IEEE/EIA 12207.1-1997 are prescribed by 6.22 of IEEE/ EIA 12207.1-1997. A compliant SRD shall achieve the purpose stated in 6.22.1 of IEEE/EIA 12207.1-1997. The purpose of the SRD is: IEEE/EIA 12207.1-1997, subclause 6.22.1: Purpose: Specify the requirements for a soft-ware item and the methods to be used to ensure that each requirement has been met. Used as the basis for design and qualification testing of a software item. An SRS complying with this recommended practice and meeting the additional requirements of Table B.3 of this recommended practice would achieve the stated purpose. An SRD compliant with IEEE/EIA 12207.1-1997 shall satisfy the specific content requirements provided in 6.22.3 and 6.22.4 of that standard. Table B.3 of this recommended practice lists the specific content items and, where appropriate, references the clause of this recommended practice that requires the same informa-tion. An SRD specified according the requirements stated or referenced in Table B.3 of this recommended prac-tice shall be evaluated considering the criteria provided in 5.3.4.2 of IEEE/EIA 12207.0-1996."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_0c2317fc346dd0c9",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "life cycle data shall be managed in accordance with the objectives provided in Annex H of IEEE/EIA 12207.0-1996.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "Section_9eca1209b3193307",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.4.4",
        "heading": "Compliance with life cycle data objectives",
        "body": "In addition to the content requirements, life cycle data shall be managed in accordance with the objectives provided in Annex H of IEEE/EIA 12207.0-1996."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_1e4c00d0cc455b72",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "to comply with IEEE/EIA 12207.1-1997, an SRS shall support the life cycle data objectives of Annex H of IEEE/EIA 12207.0-1996.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "Section_8e7c3e0002bff95c",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "B.5",
        "heading": "Conclusion",
        "body": "The analysis suggests that any SRS complying with this recommended practice and the additions shown in Table B.2 and Table B.3 also complies with the requirements of an SRD in IEEE/EIA 12207.1-1997. In addition, to comply with IEEE/EIA 12207.1-1997, an SRS shall support the life cycle data objectives of Annex H of IEEE/EIA 12207.0-1996."
      }
    },
    {
      "data": {
        "id": "Section_124336b907cee972",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Overview",
        "heading": "Overview",
        "body": "This recommended practice describes recommended approaches for the specification of software require-ments. It is divided into five clauses. Clause 1 explains the scope of this recommended practice. Clause 2 lists the references made to other standards. Clause 3 provides definitions of specific terms used. Clause 4 provides background information for writing a good SRS. Clause 5 discusses each of the essential parts of an SRS. This recommended practice also has two annexes, one which provides alternate format templates, and one which provides guidelines for compliance with IEEE/EIA 12207.1-1997."
      }
    },
    {
      "data": {
        "id": "Section_1a0689ecf150e1ed",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Scope",
        "heading": "Scope",
        "body": "This is a recommended practice for writing software requirements specifications. It describes the content and qualities of a good software requirements specification (SRS) and presents several sample SRS outlines. This recommended practice is aimed at specifying requirements of software to be developed but also can be applied to assist in the selection of in-house and commercial software products. However, application to already-developed software could be counterproductive. When software is embedded in some larger system, such as medical equipment, then issues beyond those identified in this recommended practice may have to be addressed. This recommended practice describes the process of creating a product and the content of the product. The product is an SRS. This recommended practice can be used to create such an SRS directly or can be used as a model for a more specific standard. This recommended practice does not identify any specific method, nomenclature, or tool for preparing an SRS."
      }
    },
    {
      "data": {
        "id": "Section_eb7196b6152aa1df",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "References",
        "heading": "References",
        "body": "This recommended practice shall be used in conjunction with the following publications."
      }
    },
    {
      "data": {
        "id": "Section_ff5c764fbbb57d00",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Definitions",
        "heading": "Definitions",
        "body": "In general the definitions of terms used in this recommended practice conform to the definitions provided in IEEE Std 610.12-1990. The definitions below are key terms as they are used in this recommended practice."
      }
    },
    {
      "data": {
        "id": "Section_937567bc0cedad9e",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Considerations for producing a good SRS",
        "heading": "Considerations for producing a good SRS",
        "body": "This clause provides background information that should be considered when writing an SRS. This includes the following:"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_47e34e29a59e7faf",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The basic issues that the SRS writer(s) shall address are the following:",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_ad5c1e2bedd7bbb3",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "For recommended contents of an SRS see Clause 5.",
        "modality": "recommended"
      }
    },
    {
      "data": {
        "id": "Section_d5d093a0566c2f0c",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Nature of the SRS",
        "heading": "Nature of the SRS",
        "body": "The SRS is a specification for a particular software product, program, or set of programs that performs certain functions in a specific environment. The SRS may be written by one or more representatives of the supplier, one or more representatives of the customer, or by both. Subclause 4.4 recommends both. The basic issues that the SRS writer(s) shall address are the following: 1. Functionality. What is the software supposed to do? 2. External interjaces. How does the software interact with people, the system's hardware, other hard-ware, and other software? 3. Perjormance. What is the speed, availability, response time, recovery time of various software func-tions, etc.? 4. Attributes. What are the portability, correctness, maintainability, security, etc. considerations? 5. Design constraints imposed on an implementation. Are there any required standards in effect, imple-mentation language, policies for database integrity, resource limits, operating environment(s) etc.? The SRS writer(s) should avoid placing either design or project requirements in the SRS. For recommended contents of an SRS see Clause 5."
      }
    },
    {
      "data": {
        "id": "Section_25202bf6cdf6c2c1",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Environment of the SRS",
        "heading": "Environment of the SRS",
        "body": "It is important to consider the part that the SRS plays in the total project plan, which is defined in IEEE Std 610.12-1990. The software may contain essentially all the functionality of the project or it may be part of a larger system. In the latter case typically there will be an SRS that will state the interfaces between the system and its software portion, and will place external performance and functionality requirements upon the software portion. Of course the SRS should then agree with and expand upon these system requirements. IEEE Std 1074-1997 describes the steps in the software life cycle and the applicable inputs for each step. Other standards, such as those listed in Clause 2, relate to other parts of the software life cycle and so may complement software requirements. Since the SRS has a specific role to play in the software development process, the SRS writer(s) should be careful not to go beyond the bounds of that role. This means the SRS 1. Should correctly define all of the software requirements. A software requirement may exist because of the nature of the task to be solved or because of a special characteristic of the project. 2. Should not describe any design or implementation details. These should be described in the design stage of the project. 3. Should not impose additional constraints on the software. These are properly specified in other documents such as a software quality assurance plan. Therefore, a properly written SRS limits the range of valid designs, but does not specify any particular design."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_531610011f0f77af",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "An SRS should be Correct; Unambiguous; Complete; Consistent; Ranked for importance and/or stability; Verifiable; Modifiable; Traceable.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_4d40047d7629a68f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Characteristics of a good SRS",
        "heading": "Characteristics of a good SRS",
        "body": "An SRS should be 1. Correct; 2. Unambiguous; 3. Complete; 4. Consistent; 5. Ranked for importance and/or stability; 6. Verifiable; 7. Modifiable; 8. Traceable."
      }
    },
    {
      "data": {
        "id": "Section_707347ea46a99851",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Correct",
        "heading": "Correct",
        "body": "An SRS is correct if, and only if, every requirement stated therein is one that the software shall meet. There is no tool or procedure that ensures correctness. The SRS should be compared with any applicable superior specification, such as a system requirements specification, with other project documentation, and with other applicable standards, to ensure that it agrees. Alternatively the customer or user can determine if the SRS correctly reflects the actual needs. Traceability makes this procedure easier and less prone to error (see 4.3.8)."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_8f01263c08899ee6",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Subclauses 4.3.2.1 through 4.3.2.3 recommend how to avoid ambiguity.",
        "modality": "recommended"
      }
    },
    {
      "data": {
        "id": "Section_c34f742759946c28",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Unambiguous",
        "heading": "Unambiguous",
        "body": "An SRS is unambiguous if, and only if, every requirement stated therein has only one interpretation. As a minimum, this requires that each characteristic of the final product be described using a single unique term. In cases where a term used in a particular context could have multiple meanings, the term should be included in a glossary where its meaning is made more specific. An SRS is an important part of the requirements process of the software life cycle and is used in design, implementation, project monitoring, verification and validation, and in training as described in IEEE Std 1074-1997. The SRS should be unambiguous both to those who create it and to those who use it. However, these groups often do not have the same background and therefore do not tend to describe software require-ments the same way. Representations that improve the requirements specification for the developer may be counterproductive in that they diminish understanding to the user and vice versa. Subclauses 4.3.2.1 through 4.3.2.3 recommend how to avoid ambiguity."
      }
    },
    {
      "data": {
        "id": "Section_ed3dedd6c4b8ee93",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Natural language pitfalls",
        "heading": "Natural language pitfalls",
        "body": "Requirements are often written in natural language (e.g., English). Natural language is inherently ambigu-ous. A natural language SRS should be reviewed by an independent party to identify ambiguous use of language so that it can be corrected."
      }
    },
    {
      "data": {
        "id": "Section_cfd6496f81858f85",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Requirements speciication languages",
        "heading": "Requirements speciication languages",
        "body": "One way to avoid the ambiguity inherent in natural language is to write the SRS in a particular requirements specification language. Its language processors automatically detect many lexical, syntactic, and semantic errors. One disadvantage in the use of such languages is the length of time required to learn them. Also, many non-technical users find them unintelligible. Moreover, these languages tend to be better at expressing certain types of requirements and addressing certain types of systems. Thus, they may influence the requirements in subtle ways."
      }
    },
    {
      "data": {
        "id": "Section_6ccd5d4dbd3a3129",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Representation tools",
        "heading": "Representation tools",
        "body": "In general, requirements methods and languages and the tools that support them fall into three general cate-gories-object, process, and behavioral. Object-oriented approaches organize the requirements in terms of real-world objects, their attributes, and the services performed by those objects. Process-based approaches organize the requirements into hierarchies of functions that communicate via data flows. Behavioral approaches describe external behavior of the system in terms of some abstract notion (such as predicate calculus), mathematical functions, or state machines. The degree to which such tools and methods may be useful in preparing an SRS depends upon the size and complexity of the program. No attempt is made here to describe or endorse any particular tool. When using any of these approaches it is best to retain the natural language descriptions. That way, custom-ers unfamiliar with the notations can still understand the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_aeca567cf9c71a38",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "any external requirements imposed by a system speci-fication should be acknowledged and treated.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_9645e3c722d954ed",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Complete",
        "heading": "Complete",
        "body": "An SRS is complete if, and only if, it includes the following elements: 1. All significant requirements, whether relating to functionality, performance, design constraints, attributes, or external interfaces. In particular any external requirements imposed by a system speci-fication should be acknowledged and treated. 2. Definition of the responses of the software to all realizable classes of input data in all realizable classes of situations. Note that it is important to specify the responses to both valid and invalid input values. 3. Full labels and references to all figures, tables, and diagrams in the SRS and definition of all terms and units of measure."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_82e1f9f87b85641e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The TBD is, however, occa-sionally necessary and should be accompanied by A description of the conditions causing the TBD (e.g., why an answer is not known) so that the situ-ation can be resolved; A description of what must be done to eliminate the TBD, who is responsible for its elimination, and by when it must be eliminated.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_847ccc0ca444ccac",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Use of TBDs",
        "heading": "Use of TBDs",
        "body": "Any SRS that uses the phrase \"to be determined\" (TBD) is not a complete SRS. The TBD is, however, occa-sionally necessary and should be accompanied by 1. A description of the conditions causing the TBD (e.g., why an answer is not known) so that the situ-ation can be resolved; 2. A description of what must be done to eliminate the TBD, who is responsible for its elimination, and by when it must be eliminated."
      }
    },
    {
      "data": {
        "id": "Section_cccf651eef23ea48",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Consistent",
        "heading": "Consistent",
        "body": "Consistency refers to internal consistency. If an SRS does not agree with some higher-level document, such as a system requirements specification, then it is not correct (see 4.3.1)."
      }
    },
    {
      "data": {
        "id": "Section_0aa31e7f536ab7d9",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Internal consistency",
        "heading": "Internal consistency",
        "body": "An SRS is internally consistent if, and only if, no subset of individual requirements described in it conflict. The three types of likely conflicts in an SRS are as follows: 1. The specified characteristics of real-world objects may conflict. For example, 1. The format of an output report may be described in one requirement as tabular but in another as textual. 2. One requirement may state that all lights shall be green while another may state that all lights shall be blue. 2. There may be logical or temporal conflict between two specified actions. For example, 1. One requirement may specify that the program will add two inputs and another may specify that the program will multiply them. 2. One requirement may state that \"A\" must always follow \"B,\" while another may require that \"A and B\" occur simultaneously. 3. Two or more requirements may describe the same real-world object but use different terms for that object. For example, a program's request for a user input may be called a \"prompt\" in one require-ment and a \"cue\" in another. The use of standard terminology and definitions promotes consistency."
      }
    },
    {
      "data": {
        "id": "Section_a7bb16ce5c95a750",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Ranked for importance and/or stability",
        "heading": "Ranked for importance and/or stability",
        "body": "An SRS is ranked for importance and/or stability if each requirement in it has an identifier to indicate either the importance or stability of that particular requirement. Typically, all of the requirements that relate to a software product are not equally important. Some require-ments may be essential, especially for life-critical applications, while others may be desirable. Each requirement in the SRS should be identified to make these differences clear and explicit. Identifying the requirements in the following manner helps: 1. Have customers give more careful consideration to each requirement, which often clarifies any hidden assumptions they may have. 2. Have developers make correct design decisions and devote appropriate levels of effort to the differ-ent parts of the software product."
      }
    },
    {
      "data": {
        "id": "Section_6af6586a4413cb0f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Degree of stability",
        "heading": "Degree of stability",
        "body": "One method of identifying requirements uses the dimension of stability. Stability can be expressed in terms of the number of expected changes to any requirement based on experience or knowledge of forthcoming events that affect the organization, functions, and people supported by the software system."
      }
    },
    {
      "data": {
        "id": "Section_e70fcfde5e16342d",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Degree of necessity",
        "heading": "Degree of necessity",
        "body": "Another way to rank requirements is to distinguish classes of requirements as essential, conditional, and optional. 1. Essential. Implies that the software will not be acceptable unless these requirements are provided in an agreed manner. 2. Conditional. Implies that these are requirements that would enhance the software product, but would not make it unacceptable if they are absent. 3. Optional. Implies a class of functions that may or may not be worthwhile. This gives the supplier the opportunity to propose something that exceeds the SRS."
      }
    },
    {
      "data": {
        "id": "Section_521900963d93e660",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Veriiable",
        "heading": "Veriiable",
        "body": "An SRS is verifiable if, and only if, every requirement stated therein is verifiable. A requirement is verifiable if, and only if, there exists some finite cost-effective process with which a person or machine can check that the software product meets the requirement. In general any ambiguous requirement is not verifiable. Nonverifiable requirements include statements such as \"works well,\" \"good human interface,\" and \"shall usually happen.\" These requirements cannot be verified because it is impossible to define the terms \"good,\" \"well,\" or \"usually.\" The statement that \"the program shall never enter an infinite loop\" is nonverifiable because the testing of this quality is theoretically impossible. An example of a verifiable statement is Output oj the program shall be produced within 20 s oj event ξ 60% oj the time; and shall be produced within 30 s oj event ξ J00% oj the time. This statement can be verified because it uses concrete terms and measurable quantities. If a method cannot be devised to determine whether the software meets a particular requirement, then that requirement should be removed or revised."
      }
    },
    {
      "data": {
        "id": "Section_6f5e31cf3970e3c1",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Modiiable",
        "heading": "Modiiable",
        "body": "An SRS is modifiable if, and only if, its structure and style are such that any changes to the requirements can be made easily, completely, and consistently while retaining the structure and style. Modifiability generally requires an SRS to 1. Have a coherent and easy-to-use organization with a table of contents, an index, and explicit cross-referencing; 2. Not be redundant (i.e., the same requirement should not appear in more than one place in the SRS); 3. Express each requirement separately, rather than intermixed with other requirements. Redundancy itself is not an error, but it can easily lead to errors. Redundancy can occasionally help to make an SRS more readable, but a problem can arise when the redundant document is updated. For instance, a requirement may be altered in only one of the places where it appears. The SRS then becomes inconsistent. Whenever redundancy is necessary, the SRS should include explicit cross-references to make it modifiable."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_1f88cc70ecd20f0e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The following two types of trace-ability are recommended: Backward traceability (i.e., to previous stages oj development). This depends upon each requirement explicitly referencing its source in earlier documents. Forward traceability (i.e., to all documents spawned by the SRS). This depends upon each require-ment in the SRS having a unique name or reference number.",
        "modality": "recommended"
      }
    },
    {
      "data": {
        "id": "Section_d139de4c205aad6f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Traceable",
        "heading": "Traceable",
        "body": "An SRS is traceable if the origin of each of its requirements is clear and if it facilitates the referencing of each requirement in future development or enhancement documentation. The following two types of trace-ability are recommended: 1. Backward traceability (i.e., to previous stages oj development). This depends upon each requirement explicitly referencing its source in earlier documents. 2. Forward traceability (i.e., to all documents spawned by the SRS). This depends upon each require-ment in the SRS having a unique name or reference number. The forward traceability of the SRS is especially important when the software product enters the operation and maintenance phase. As code and design documents are modified, it is essential to be able to ascertain the complete set of requirements that may be affected by those modifications."
      }
    },
    {
      "data": {
        "id": "Section_43e87c4be247fe35",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Joint preparation of the SRS",
        "heading": "Joint preparation of the SRS",
        "body": "The software development process should begin with supplier and customer agreement on what the completed software must do. This agreement, in the form of an SRS, should be jointly prepared. This is important because usually neither the customer nor the supplier is qualified to write a good SRS alone. 1. Customers usually do not understand the software design and development process well enough to write a usable SRS. 2. Suppliers usually do not understand the customer's problem and field of endeavor well enough to specify requirements for a satisfactory system. Therefore, the customer and the supplier should work together to produce a well-written and completely understood SRS. A special situation exists when a system and its software are both being defined concurrently. Then the func-tionality, interfaces, performance, and other attributes and constraints of the software are not predefined, but rather are jointly defined and subject to negotiation and change. This makes it more difficult, but no less important, to meet the characteristics stated in 4.3. In particular, an SRS that does not comply with the requirements of its parent system specification is incorrect. This recommended practice does not specifically discuss style, language usage, or techniques of good writ-ing. It is quite important, however, that an SRS be well written. General technical writing books can be used for guidance."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_12f9cba882d8a90b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Approved changes in requirements should be incorporated in the SRS in such a way as to Provide an accurate and complete audit trail of changes; Permit the review of current and superseded portions of the SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_7e320d307bfc852d",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "SRS evolution",
        "heading": "SRS evolution",
        "body": "The SRS may need to evolve as the development of the software product progresses. It may be impossible to specify some details at the time the project is initiated (e.g., it may be impossible to define all of the screen formats for an interactive program during the requirements phase). Additional changes may ensue as defi-ciencies, shortcomings, and inaccuracies are discovered in the SRS. Two major considerations in this process are the following: 1. Requirements should be specified as completely and thoroughly as is known at the time, even if evolutionary revisions can be foreseen as inevitable. The fact that they are incomplete should be noted. 2. A formal change process should be initiated to identify, control, track, and report projected changes. Approved changes in requirements should be incorporated in the SRS in such a way as to 1. Provide an accurate and complete audit trail of changes; 2. Permit the review of current and superseded portions of the SRS."
      }
    },
    {
      "data": {
        "id": "Section_09cc757adeaabbe6",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Prototyping",
        "heading": "Prototyping",
        "body": "Prototyping is used frequently during the requirements portion of a project. Many tools exist that allow a prototype, exhibiting some characteristics of a system, to be created very quickly and easily. See also ASTM E1340-96. Prototypes are useful for the following reasons: 1. The customer may be more likely to view the prototype and react to it than to read the SRS and react to it. Thus, the prototype provides quick feedback. 2. The prototype displays unanticipated aspects of the systems behavior. Thus, it produces not only answers but also new questions. This helps reach closure on the SRS. 3. An SRS based on a prototype tends to undergo less change during development, thus shortening development time. A prototype should be used as a way to elicit software requirements. Some characteristics such as screen or report formats can be extracted directly from the prototype. Other requirements can be inferred by running experiments with the prototype."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_fde3b1f6fd22b96e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should not normally specify design items such as the following:",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_72c8b84706f4e3ec",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Embedding design in the SRS",
        "heading": "Embedding design in the SRS",
        "body": "A requirement specifies an externally visible function or attribute of a system. A design describes a particu-lar subcomponent of a system and/or its interfaces with other subcomponents. The SRS writer(s) should clearly distinguish between identifying required design constraints and projecting a specific design. Note that every requirement in the SRS limits design alternatives. This does not mean, though, that every require-ment is design. The SRS should specify what functions are to be performed on what data to produce what results at what location for whom. The SRS should focus on the services to be performed. The SRS should not normally specify design items such as the following: 1. Partitioning the software into modules; 2. Allocating functions to the modules; 3. Describing the flow of information or control between modules; 4. Choosing data structures."
      }
    },
    {
      "data": {
        "id": "Section_e329bd70b136e6b5",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Necessary design requirements",
        "heading": "Necessary design requirements",
        "body": "In special cases some requirements may severely restrict the design. For example, security or safety require-ments may reflect directly into design such as the need to 1. Keep certain functions in separate modules; 2. Permit only limited communication between some areas of the program; 3. Check data integrity for critical variables. Examples of valid design constraints are physical requirements, performance requirements, software devel-opment standards, and software quality assurance standards. Therefore, the requirements should be stated from a purely external viewpoint. When using models to illus-trate the requirements, remember that the model only indicates the external behavior, and does not specify a design."
      }
    },
    {
      "data": {
        "id": "Section_da4e71d926e68566",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Embedding project requirements in the SRS",
        "heading": "Embedding project requirements in the SRS",
        "body": "The SRS should address the software product, not the process of producing the software product. Project requirements represent an understanding between the customer and the supplier about contractual matters pertaining to production of software and thus should not be included in the SRS. These normally include items such as 1. Cost; 2. Delivery schedules; 3. Reporting procedures; 4. Software development methods; 5. Quality assurance; 6. Validation and verification criteria; 7. Acceptance procedures. Project requirements are specified in other documents, typically in a software development plan, a software quality assurance plan, or a statement of work."
      }
    },
    {
      "data": {
        "id": "Section_cc4359fa52757e0d",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "The parts of an SRS",
        "heading": "The parts of an SRS",
        "body": "This clause discusses each of the essential parts of the SRS. These parts are arranged in Figure 1 in an outline that can serve as an example for writing an SRS. While an SRS does not have to follow this outline or use the names given here for its parts, a good SRS should include all the information discussed here."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b2530d21c25c98d0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It should contain the following subsections:",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_8f18b20a1f37cd4f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Introduction (Section 1 of the SRS)",
        "heading": "Introduction (Section 1 of the SRS)",
        "body": "The introduction of the SRS should provide an overview of the entire SRS. It should contain the following subsections:"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_f32b88d40f36385d",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should Delineate the purpose of the SRS; Specify the intended audience for the SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_6751f51c8e1f93d7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Purpose (1.1 of the SRS)",
        "heading": "Purpose (1.1 of the SRS)",
        "body": "This subsection should 1. Delineate the purpose of the SRS; 2. Specify the intended audience for the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6bf4447a75acc157",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should Identify the software product(s) to be produced by name (e.g., Host DBMS, Report Generator, etc.); Explain what the software product(s) will, and, if necessary, will not do; Describe the application of the software being specified, including relevant benefits, objectives, and goals; Be consistent with similar statements in higher-level specifications (e.g., the system requirements specification), if they exist.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_e75f710e36c1826f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Scope (1.2 of the SRS)",
        "heading": "Scope (1.2 of the SRS)",
        "body": "This subsection should 1. Identify the software product(s) to be produced by name (e.g., Host DBMS, Report Generator, etc.); 2. Explain what the software product(s) will, and, if necessary, will not do; 3. Describe the application of the software being specified, including relevant benefits, objectives, and goals; 4. Be consistent with similar statements in higher-level specifications (e.g., the system requirements specification), if they exist."
      }
    },
    {
      "data": {
        "id": "Section_6aea2906fda6d6b9",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Deinitions, acronyms, and abbreviations (1.3 of the SRS)",
        "heading": "Deinitions, acronyms, and abbreviations (1.3 of the SRS)",
        "body": "This subsection should provide the definitions of all terms, acronyms, and abbreviations required to properly interpret the SRS. This information may be provided by reference to one or more appendixes in the SRS or by reference to other documents."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_40f119ef18da61e7",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should Provide a complete list of all documents referenced elsewhere in the SRS; Identify each document by title, report number (if applicable), date, and publishing organization; Specify the sources from which the references can be obtained.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_3c5a8a4f35a2c6d1",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "References (1.4 of the SRS)",
        "heading": "References (1.4 of the SRS)",
        "body": "This subsection should 1. Provide a complete list of all documents referenced elsewhere in the SRS; 2. Identify each document by title, report number (if applicable), date, and publishing organization; 3. Specify the sources from which the references can be obtained. This information may be provided by reference to an appendix or to another document."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_d54719607001acd6",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should Describe what the rest of the SRS contains; Explain how the SRS is organized.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_ee01fa2c3cc317c1",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Overview (1.5 of the SRS)",
        "heading": "Overview (1.5 of the SRS)",
        "body": "This subsection should 1. Describe what the rest of the SRS contains; 2. Explain how the SRS is organized."
      }
    },
    {
      "data": {
        "id": "Section_9a00d251102b84ba",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Overall description (Section 2 of the SRS)",
        "heading": "Overall description (Section 2 of the SRS)",
        "body": "This section of the SRS should describe the general factors that affect the product and its requirements. This section does not state specific requirements. Instead, it provides a background for those requirements, which are defined in detail in Section 3 of the SRS, and makes them easier to understand. This section usually consists of six subsections, as follows:"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_9f67e0815fc6c38f",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "If the SRS defines a product that is a component of a larger system, as frequently occurs, then this subsection should relate the requirements of that larger system to functionality of the software and should identify interfaces between that system and the software.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_b7df50023a59ed81",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "Product perspective (2.1 of the SRS)",
        "heading": "Product perspective (2.1 of the SRS)",
        "body": "This subsection of the SRS should put the product into perspective with other related products. If the product is independent and totally self-contained, it should be so stated here. If the SRS defines a product that is a component of a larger system, as frequently occurs, then this subsection should relate the requirements of that larger system to functionality of the software and should identify interfaces between that system and the software. A block diagram showing the major components of the larger system, interconnections, and external inter-faces can be helpful. This subsection should also describe how the software operates inside various constraints. For example, these constraints could include"
      }
    },
    {
      "data": {
        "id": "Section_8e13bc26da0c2319",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "System interfaces",
        "heading": "System interfaces",
        "body": "This should list each system interface and identify the functionality of the software to accomplish the system requirement and the interface description to match the system."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e99e6c3281845ac7",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
