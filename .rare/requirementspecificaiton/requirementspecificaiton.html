        "key": "Introduction",
        "heading": "Introduction",
        "body": "This introduction is not a part of IEEE Std 830-1998, IEEE Recommended Practice for Software Requirements Specifi-cations. This recommended practice describes recommended approaches for the specification of software require-ments. It is based on a model in which the result of the software requirements specification process is an unambiguous and complete specification document. It should help 1. Software customers to accurately describe what they wish to obtain; 2. Software suppliers to understand exactly what the customer wants; 3. Individuals to accomplish the following goals: 1. Develop a standard software requirements specification (SRS) outline for their own organiza-tions; 2. Define the format and content of their specific software requirements specifications; 3. Develop additional local supporting items such as an SRS quality checklist, or an SRS writer's handbook. To the customers, suppliers, and other individuals, a good SRS should provide several specific benefits, such as the following: - Establish the basis for agreement between the customers and the suppliers on what the software product is to do. The complete description of the functions to be performed by the software specified in the SRS will assist the potential users to determine if the software specified meets their needs or how the software must be modified to meet their needs. - Reduce the development effort. The preparation of the SRS forces the various concerned groups in the customer's organization to consider rigorously all of the requirements before design begins and reduces later redesign, recoding, and retesting. Careful review of the requirements in the SRS can reveal omissions, misunderstandings, and inconsistencies early in the development cycle when these problems are easier to correct. - Provide a basis for estimating costs and schedules. The description of the product to be developed as given in the SRS is a realistic basis for estimating project costs and can be used to obtain approval for bids or price estimates. - Provide a baseline for validation and verification. Organizations can develop their validation and verification plans much more productively from a good SRS. As a part of the development contract, the SRS provides a baseline against which compliance can be measured. - Facilitate transfer. The SRS makes it easier to transfer the software product to new users or new machines. Customers thus find it easier to transfer the software to other parts of their organization, and suppliers find it easier to transfer it to new customers. - Serve as a basis for enhancement. Because the SRS discusses the product but not the project that developed it, the SRS serves as a basis for later enhancement of the finished product. The SRS may need to be altered, but it does provide a foundation for continued production evaluation. The readers of this document are referred to Annex B for guidelines for using this recommended practice to meet the requirements of IEEE/EIA 12207.1-1997, IEEE/EIA Guide-Industry Implementation of ISO/IEC 12207: 1995, Standard for Information Technology-Software life cycle processes-Life cycle data."

        "key": "1.1",
        "heading": "Scope",
        "body": "This is a recommended practice for writing software requirements specifications. It describes the content and qualities of a good software requirements specification (SRS) and presents several sample SRS outlines. This recommended practice is aimed at specifying requirements of software to be developed but also can be applied to assist in the selection of in-house and commercial software products. However, application to already-developed software could be counterproductive. When software is embedded in some larger system, such as medical equipment, then issues beyond those identified in this recommended practice may have to be addressed. This recommended practice describes the process of creating a product and the content of the product. The product is an SRS. This recommended practice can be used to create such an SRS directly or can be used as a model for a more specific standard. This recommended practice does not identify any specific method, nomenclature, or tool for preparing an SRS."

        "heading": "Considerations for producing a good SRS",
        "body": "This clause provides background information that should be considered when writing an SRS. This includes the following: 1. Nature of the SRS; 2. Environment of the SRS; 3. Characteristics of a good SRS; 4. Joint preparation of the SRS; 5. SRS evolution; 6. Prototyping; 7. Embedding design in the SRS; 8. Embedding project requirements in the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_7290890cbe38602e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The basic issues that the SRS writer(s) shall address are the following: 1. Functionality. What is the software supposed to do? 2. External interjaces. How does the software interact with people, the system's hardware, other hard-ware, and other software? 3. Perjormance. What is the speed, availability, response time, recovery time of various software func-tions, etc.? 4. Attributes. What are the portability, correctness, maintainability, security, etc. considerations? 5. Design constraints imposed on an implementation. Are there any required standards in effect, imple-mentation language, policies for database integrity, resource limits, operating environment(s) etc.?",
        "modality": "shall"
      }
    },

        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS writer(s) should avoid placing either design or project requirements in the SRS.",

        "key": "4.1",
        "heading": "Nature of the SRS",
        "body": "The SRS is a specification for a particular software product, program, or set of programs that performs certain functions in a specific environment. The SRS may be written by one or more representatives of the supplier, one or more representatives of the customer, or by both. Subclause 4.4 recommends both. The basic issues that the SRS writer(s) shall address are the following: 1. Functionality. What is the software supposed to do? 2. External interjaces. How does the software interact with people, the system's hardware, other hard-ware, and other software? 3. Perjormance. What is the speed, availability, response time, recovery time of various software func-tions, etc.? 4. Attributes. What are the portability, correctness, maintainability, security, etc. considerations? 5. Design constraints imposed on an implementation. Are there any required standards in effect, imple-mentation language, policies for database integrity, resource limits, operating environment(s) etc.? The SRS writer(s) should avoid placing either design or project requirements in the SRS. For recommended contents of an SRS see Clause 5."
      }
    },
    {
      "data": {
        "id": "Reference_c8e014707097e2f3",
        "label": "Reference",
        "type": "entity",
        "__class__": "Reference",
        "citation": "IEEE Std 1074-1997"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6f04dc95b37c1f01",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Of course the SRS should then agree with and expand upon these system requirements.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c1634d31909457a3",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Since the SRS has a specific role to play in the software development process, the SRS writer(s) should be careful not to go beyond the bounds of that role.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_13f2a69c7e7cf898",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Should correctly define all of the software requirements.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b269d2ade230efd9",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Should not describe any design or implementation details.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_8b4729ae247c76a0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Should not impose additional constraints on the software.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "Section_8b1e04b3224c80f0",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.2",
        "heading": "Environment of the SRS",
        "body": "It is important to consider the part that the SRS plays in the total project plan, which is defined in IEEE Std 610.12-1990. The software may contain essentially all the functionality of the project or it may be part of a larger system. In the latter case typically there will be an SRS that will state the interfaces between the system and its software portion, and will place external performance and functionality requirements upon the software portion. Of course the SRS should then agree with and expand upon these system requirements. IEEE Std 1074-1997 describes the steps in the software life cycle and the applicable inputs for each step. Other standards, such as those listed in Clause 2, relate to other parts of the software life cycle and so may complement software requirements. Since the SRS has a specific role to play in the software development process, the SRS writer(s) should be careful not to go beyond the bounds of that role. This means the SRS 1. Should correctly define all of the software requirements. A software requirement may exist because of the nature of the task to be solved or because of a special characteristic of the project. 2. Should not describe any design or implementation details. These should be described in the design stage of the project. 3. Should not impose additional constraints on the software. These are properly specified in other documents such as a software quality assurance plan. Therefore, a properly written SRS limits the range of valid designs, but does not specify any particular design."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_477a8ecb71a03608",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "An SRS should be 1. Correct; 2. Unambiguous; 3. Complete; 4. Consistent; 5. Ranked for importance and/or stability; 6. Verifiable; 7. Modifiable; 8. Traceable.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_45849d7121619a07",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3",
        "heading": "Characteristics of a good SRS",
        "body": "An SRS should be 1. Correct; 2. Unambiguous; 3. Complete; 4. Consistent; 5. Ranked for importance and/or stability; 6. Verifiable; 7. Modifiable; 8. Traceable."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c398cc896b5d662c",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "every requirement stated therein is one that the software shall meet.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_214b26080b6de487",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should be compared with any applicable superior specification, such as a system requirements specification, with other project documentation, and with other applicable standards, to ensure that it agrees.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_050b2206f8d0180e",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.1",
        "heading": "Correct",
        "body": "An SRS is correct if, and only if, every requirement stated therein is one that the software shall meet. There is no tool or procedure that ensures correctness. The SRS should be compared with any applicable superior specification, such as a system requirements specification, with other project documentation, and with other applicable standards, to ensure that it agrees. Alternatively the customer or user can determine if the SRS correctly reflects the actual needs. Traceability makes this procedure easier and less prone to error (see 4.3.8)."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_709fb9c619194612",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "this requires that each characteristic of the final product be described using a single unique term.",
        "modality": "required"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_d6fd8d1789a91fd0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "the term should be included in a glossary where its meaning is made more specific.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_d62c646673f3a280",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should be unambiguous both to those who create it and to those who use it.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_83906f2bd4f60a21",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.2",
        "heading": "Unambiguous",
        "body": "An SRS is unambiguous if, and only if, every requirement stated therein has only one interpretation. As a minimum, this requires that each characteristic of the final product be described using a single unique term. In cases where a term used in a particular context could have multiple meanings, the term should be included in a glossary where its meaning is made more specific. An SRS is an important part of the requirements process of the software life cycle and is used in design, implementation, project monitoring, verification and validation, and in training as described in IEEE Std 1074-1997. The SRS should be unambiguous both to those who create it and to those who use it. However, these groups often do not have the same background and therefore do not tend to describe software require-ments the same way. Representations that improve the requirements specification for the developer may be counterproductive in that they diminish understanding to the user and vice versa. Subclauses 4.3.2.1 through 4.3.2.3 recommend how to avoid ambiguity."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_961add2e5edd57c3",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "A natural language SRS should be reviewed by an independent party to identify ambiguous use of language so that it can be corrected.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_eb9182a74497e06d",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.2.1",
        "heading": "Natural language pitfalls",
        "body": "Requirements are often written in natural language (e.g., English). Natural language is inherently ambigu-ous. A natural language SRS should be reviewed by an independent party to identify ambiguous use of language so that it can be corrected."
      }
    },
    {
      "data": {
        "id": "Section_839228e25b077ea0",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.2.2",
        "heading": "Requirements speciication languages",
        "body": "One way to avoid the ambiguity inherent in natural language is to write the SRS in a particular requirements specification language. Its language processors automatically detect many lexical, syntactic, and semantic errors. One disadvantage in the use of such languages is the length of time required to learn them. Also, many non-technical users find them unintelligible. Moreover, these languages tend to be better at expressing certain types of requirements and addressing certain types of systems. Thus, they may influence the requirements in subtle ways."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_0be9e6e2d6574d92",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "When using any of these approaches it is best to retain the natural language descriptions.",
        "modality": "recommended"
      }
    },
    {
      "data": {
        "id": "Section_4f53d06a6054013b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.2.3",
        "heading": "Representation tools",
        "body": "In general, requirements methods and languages and the tools that support them fall into three general cate-gories-object, process, and behavioral. Object-oriented approaches organize the requirements in terms of real-world objects, their attributes, and the services performed by those objects. Process-based approaches organize the requirements into hierarchies of functions that communicate via data flows. Behavioral approaches describe external behavior of the system in terms of some abstract notion (such as predicate calculus), mathematical functions, or state machines. The degree to which such tools and methods may be useful in preparing an SRS depends upon the size and complexity of the program. No attempt is made here to describe or endorse any particular tool. When using any of these approaches it is best to retain the natural language descriptions. That way, custom-ers unfamiliar with the notations can still understand the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e9ddd4c293fb7544",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "In particular any external requirements imposed by a system speci-fication should be acknowledged and treated.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_5b7ad665fa6a29b6",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "it is important to specify the responses to both valid and invalid input values.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_f989fb9f1f28e94f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.3",
        "heading": "Complete",
        "body": "An SRS is complete if, and only if, it includes the following elements: 1. All significant requirements, whether relating to functionality, performance, design constraints, attributes, or external interfaces. In particular any external requirements imposed by a system speci-fication should be acknowledged and treated. 2. Definition of the responses of the software to all realizable classes of input data in all realizable classes of situations. Note that it is important to specify the responses to both valid and invalid input values. 3. Full labels and references to all figures, tables, and diagrams in the SRS and definition of all terms and units of measure."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_11df195b1f0e4b53",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The TBD is, however, occa-sionally necessary and should be accompanied by 1. A description of the conditions causing the TBD (e.g., why an answer is not known) so that the situ-ation can be resolved; 2. A description of what must be done to eliminate the TBD, who is responsible for its elimination, and by when it must be eliminated.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6a583329e36922bf",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "what must be done to eliminate the TBD, who is responsible for its elimination, and by when it must be eliminated.",
        "modality": "must"
      }
    },
    {
      "data": {
        "id": "Section_13b9b5571a8b5729",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.3.1",
        "heading": "Use of TBDs",
        "body": "Any SRS that uses the phrase \"to be determined\" (TBD) is not a complete SRS. The TBD is, however, occa-sionally necessary and should be accompanied by 1. A description of the conditions causing the TBD (e.g., why an answer is not known) so that the situ-ation can be resolved; 2. A description of what must be done to eliminate the TBD, who is responsible for its elimination, and by when it must be eliminated."
      }
    },
    {
      "data": {
        "id": "Section_a48dfe9e3dc209e2",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.4",
        "heading": "Consistent",
        "body": "Consistency refers to internal consistency. If an SRS does not agree with some higher-level document, such as a system requirements specification, then it is not correct (see 4.3.1)."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_0b81161d1ffb164e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "One requirement may state that all lights shall be green while another may state that all lights shall be blue.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_41c74108188e8711",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "One requirement may state that \"A\" must always follow \"B,\" while another may require that \"A and B\" occur simultaneously.",
        "modality": "must"
      }
    },
    {
      "data": {
        "id": "Section_ecbf7528c1070e6c",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.4.1",
        "heading": "Internal consistency",
        "body": "An SRS is internally consistent if, and only if, no subset of individual requirements described in it conflict. The three types of likely conflicts in an SRS are as follows: 1. The specified characteristics of real-world objects may conflict. For example, 1. The format of an output report may be described in one requirement as tabular but in another as textual. 2. One requirement may state that all lights shall be green while another may state that all lights shall be blue. 2. There may be logical or temporal conflict between two specified actions. For example, 1. One requirement may specify that the program will add two inputs and another may specify that the program will multiply them. 2. One requirement may state that \"A\" must always follow \"B,\" while another may require that \"A and B\" occur simultaneously. 3. Two or more requirements may describe the same real-world object but use different terms for that object. For example, a program's request for a user input may be called a \"prompt\" in one require-ment and a \"cue\" in another. The use of standard terminology and definitions promotes consistency."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_bff8dddb8e64027d",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Each requirement in the SRS should be identified to make these differences clear and explicit.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_8737cbb0d26b457a",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.5",
        "heading": "Ranked for importance and/or stability",
        "body": "An SRS is ranked for importance and/or stability if each requirement in it has an identifier to indicate either the importance or stability of that particular requirement. Typically, all of the requirements that relate to a software product are not equally important. Some require-ments may be essential, especially for life-critical applications, while others may be desirable. Each requirement in the SRS should be identified to make these differences clear and explicit. Identifying the requirements in the following manner helps: 1. Have customers give more careful consideration to each requirement, which often clarifies any hidden assumptions they may have. 2. Have developers make correct design decisions and devote appropriate levels of effort to the differ-ent parts of the software product."
      }
    },
    {
      "data": {
        "id": "Section_25cfbb2e1b436fe8",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.5.1",
        "heading": "Degree of stability",
        "body": "One method of identifying requirements uses the dimension of stability. Stability can be expressed in terms of the number of expected changes to any requirement based on experience or knowledge of forthcoming events that affect the organization, functions, and people supported by the software system."
      }
    },
    {
      "data": {
        "id": "Section_1df6e9dee4890e01",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.5.2",
        "heading": "Degree of necessity",
        "body": "Another way to rank requirements is to distinguish classes of requirements as essential, conditional, and optional. 1. Essential. Implies that the software will not be acceptable unless these requirements are provided in an agreed manner. 2. Conditional. Implies that these are requirements that would enhance the software product, but would not make it unacceptable if they are absent. 3. Optional. Implies a class of functions that may or may not be worthwhile. This gives the supplier the opportunity to propose something that exceeds the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_eb386e5b27a326b5",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "every requirement stated therein is verifiable.",
        "modality": "required"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_9a1af6668e01e9d1",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "the program shall never enter an infinite loop",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_0ded56eafa5fe9d8",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Output oj the program shall be produced within 20 s oj event ξ 60% oj the time; and shall be produced within 30 s oj event ξ J00% oj the time.",
        "modality": "shall"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6d05f773216b3336",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "If a method cannot be devised to determine whether the software meets a particular requirement, then that requirement should be removed or revised.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_9886953c806c9489",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.6",
        "heading": "Veriiable",
        "body": "An SRS is verifiable if, and only if, every requirement stated therein is verifiable. A requirement is verifiable if, and only if, there exists some finite cost-effective process with which a person or machine can check that the software product meets the requirement. In general any ambiguous requirement is not verifiable. Nonverifiable requirements include statements such as \"works well,\" \"good human interface,\" and \"shall usually happen.\" These requirements cannot be verified because it is impossible to define the terms \"good,\" \"well,\" or \"usually.\" The statement that \"the program shall never enter an infinite loop\" is nonverifiable because the testing of this quality is theoretically impossible. An example of a verifiable statement is Output oj the program shall be produced within 20 s oj event ξ 60% oj the time; and shall be produced within 30 s oj event ξ J00% oj the time. This statement can be verified because it uses concrete terms and measurable quantities. If a method cannot be devised to determine whether the software meets a particular requirement, then that requirement should be removed or revised."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_3de0b03ab35fc79f",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "the same requirement should not appear in more than one place in the SRS",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e38b8d7fa6956c11",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Whenever redundancy is necessary, the SRS should include explicit cross-references to make it modifiable.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_b5e692aba16d29fb",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.7",
        "heading": "Modiiable",
        "body": "An SRS is modifiable if, and only if, its structure and style are such that any changes to the requirements can be made easily, completely, and consistently while retaining the structure and style. Modifiability generally requires an SRS to 1. Have a coherent and easy-to-use organization with a table of contents, an index, and explicit cross-referencing; 2. Not be redundant (i.e., the same requirement should not appear in more than one place in the SRS); 3. Express each requirement separately, rather than intermixed with other requirements. Redundancy itself is not an error, but it can easily lead to errors. Redundancy can occasionally help to make an SRS more readable, but a problem can arise when the redundant document is updated. For instance, a requirement may be altered in only one of the places where it appears. The SRS then becomes inconsistent. Whenever redundancy is necessary, the SRS should include explicit cross-references to make it modifiable."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_94d80c530c2bbd76",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The following two types of trace-ability are recommended: 1. Backward traceability (i.e., to previous stages oj development). This depends upon each requirement explicitly referencing its source in earlier documents. 2. Forward traceability (i.e., to all documents spawned by the SRS). This depends upon each require-ment in the SRS having a unique name or reference number.",
        "modality": "recommended"
      }
    },
    {
      "data": {
        "id": "Section_fe323afd81cfe30f",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.3.8",
        "heading": "Traceable",
        "body": "An SRS is traceable if the origin of each of its requirements is clear and if it facilitates the referencing of each requirement in future development or enhancement documentation. The following two types of trace-ability are recommended: 1. Backward traceability (i.e., to previous stages oj development). This depends upon each requirement explicitly referencing its source in earlier documents. 2. Forward traceability (i.e., to all documents spawned by the SRS). This depends upon each require-ment in the SRS having a unique name or reference number. The forward traceability of the SRS is especially important when the software product enters the operation and maintenance phase. As code and design documents are modified, it is essential to be able to ascertain the complete set of requirements that may be affected by those modifications."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_1f86a7d280e16fb0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The software development process should begin with supplier and customer agreement on what the completed software must do.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_8aafc11747179ea1",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This agreement, in the form of an SRS, should be jointly prepared.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2eca4b75ad74b5ea",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "what the completed software must do.",
        "modality": "must"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_a6e605d47fc634c4",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Therefore, the customer and the supplier should work together to produce a well-written and completely understood SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_887d6231e531c044",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.4",
        "heading": "Joint preparation of the SRS",
        "body": "The software development process should begin with supplier and customer agreement on what the completed software must do. This agreement, in the form of an SRS, should be jointly prepared. This is important because usually neither the customer nor the supplier is qualified to write a good SRS alone. 1. Customers usually do not understand the software design and development process well enough to write a usable SRS. 2. Suppliers usually do not understand the customer's problem and field of endeavor well enough to specify requirements for a satisfactory system. Therefore, the customer and the supplier should work together to produce a well-written and completely understood SRS. A special situation exists when a system and its software are both being defined concurrently. Then the func-tionality, interfaces, performance, and other attributes and constraints of the software are not predefined, but rather are jointly defined and subject to negotiation and change. This makes it more difficult, but no less important, to meet the characteristics stated in 4.3. In particular, an SRS that does not comply with the requirements of its parent system specification is incorrect. This recommended practice does not specifically discuss style, language usage, or techniques of good writ-ing. It is quite important, however, that an SRS be well written. General technical writing books can be used for guidance."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b2ee024b41731511",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Requirements should be specified as completely and thoroughly as is known at the time, even if evolutionary revisions can be foreseen as inevitable.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_23a98b6810f09c1a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The fact that they are incomplete should be noted.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_f9e98fc48ace69e0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "A formal change process should be initiated to identify, control, track, and report projected changes.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_07c8e71193509b81",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Approved changes in requirements should be incorporated in the SRS in such a way as to 1. Provide an accurate and complete audit trail of changes; 2. Permit the review of current and superseded portions of the SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_5c8c786c66211ffa",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.5",
        "heading": "SRS evolution",
        "body": "The SRS may need to evolve as the development of the software product progresses. It may be impossible to specify some details at the time the project is initiated (e.g., it may be impossible to define all of the screen formats for an interactive program during the requirements phase). Additional changes may ensue as defi-ciencies, shortcomings, and inaccuracies are discovered in the SRS. Two major considerations in this process are the following: 1. Requirements should be specified as completely and thoroughly as is known at the time, even if evolutionary revisions can be foreseen as inevitable. The fact that they are incomplete should be noted. 2. A formal change process should be initiated to identify, control, track, and report projected changes. Approved changes in requirements should be incorporated in the SRS in such a way as to 1. Provide an accurate and complete audit trail of changes; 2. Permit the review of current and superseded portions of the SRS."
      }
    },
    {
      "data": {
        "id": "Reference_bf315fa213f1ecf8",
        "label": "Reference",
        "type": "entity",
        "__class__": "Reference",
        "citation": "ASTM E1340-96"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2b13f9cffac5c3be",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "A prototype should be used as a way to elicit software requirements.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_8dedb9adc7607e90",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.6",
        "heading": "Prototyping",
        "body": "Prototyping is used frequently during the requirements portion of a project. Many tools exist that allow a prototype, exhibiting some characteristics of a system, to be created very quickly and easily. See also ASTM E1340-96. Prototypes are useful for the following reasons: 1. The customer may be more likely to view the prototype and react to it than to read the SRS and react to it. Thus, the prototype provides quick feedback. 2. The prototype displays unanticipated aspects of the systems behavior. Thus, it produces not only answers but also new questions. This helps reach closure on the SRS. 3. An SRS based on a prototype tends to undergo less change during development, thus shortening development time. A prototype should be used as a way to elicit software requirements. Some characteristics such as screen or report formats can be extracted directly from the prototype. Other requirements can be inferred by running experiments with the prototype."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_941a900da6e74f16",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS writer(s) should clearly distinguish between identifying required design constraints and projecting a specific design.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_ec831878c9c4e48b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should specify what functions are to be performed on what data to produce what results at what location for whom.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6dc999c432d13c4e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should focus on the services to be performed.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_9c02d4d538e30bc6",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should not normally specify design items such as the following: 1. Partitioning the software into modules; 2. Allocating functions to the modules; 3. Describing the flow of information or control between modules; 4. Choosing data structures.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2d9799bf50cde845",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "the requirements should be stated from a purely external viewpoint.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_3a45f56f71d77c2e",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.7",
        "heading": "Embedding design in the SRS",
        "body": "A requirement specifies an externally visible function or attribute of a system. A design describes a particu-lar subcomponent of a system and/or its interfaces with other subcomponents. The SRS writer(s) should clearly distinguish between identifying required design constraints and projecting a specific design. Note that every requirement in the SRS limits design alternatives. This does not mean, though, that every require-ment is design. The SRS should specify what functions are to be performed on what data to produce what results at what location for whom. The SRS should focus on the services to be performed. The SRS should not normally specify design items such as the following: 1. Partitioning the software into modules; 2. Allocating functions to the modules; 3. Describing the flow of information or control between modules; 4. Choosing data structures. Examples of valid design constraints are physical requirements, performance requirements, software devel-opment standards, and software quality assurance standards. Therefore, the requirements should be stated from a purely external viewpoint. When using models to illus-trate the requirements, remember that the model only indicates the external behavior, and does not specify a design."
      }
    },
    {
      "data": {
        "id": "Section_aa0a5ba9e05c80a3",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.7.1",
        "heading": "Necessary design requirements",
        "body": "In special cases some requirements may severely restrict the design. For example, security or safety require-ments may reflect directly into design such as the need to 1. Keep certain functions in separate modules; 2. Permit only limited communication between some areas of the program; 3. Check data integrity for critical variables."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_04f640bdaa258d05",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The SRS should address the software product, not the process of producing the software product.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_a031fe97f95a13eb",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Project requirements represent an understanding between the customer and the supplier about contractual matters pertaining to production of software and thus should not be included in the SRS.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "Section_a45fb531b0629f18",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "4.8",
        "heading": "Embedding project requirements in the SRS",
        "body": "The SRS should address the software product, not the process of producing the software product. Project requirements represent an understanding between the customer and the supplier about contractual matters pertaining to production of software and thus should not be included in the SRS. These normally include items such as 1. Cost; 2. Delivery schedules; 3. Reporting procedures; 4. Software development methods; 5. Quality assurance; 6. Validation and verification criteria; 7. Acceptance procedures. Project requirements are specified in other documents, typically in a software development plan, a software quality assurance plan, or a statement of work."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c30fcc7d81207da7",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "a good SRS should include all the information discussed here.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_84062127e36a6f80",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5",
        "heading": "The parts of an SRS",
        "body": "This clause discusses each of the essential parts of the SRS. These parts are arranged in Figure 1 in an outline that can serve as an example for writing an SRS. While an SRS does not have to follow this outline or use the names given here for its parts, a good SRS should include all the information discussed here."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b5cd408a00eacb96",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The introduction of the SRS should provide an overview of the entire SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_74fd471e93196b4a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It should contain the following subsections: 1. Purpose; 2. Scope; 3. Definitions, acronyms, and abbreviations; 4. References; 5. Overview.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_71b23f55b33e733c",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.1",
        "heading": "Introduction (Section 1 of the SRS)",
        "body": "The introduction of the SRS should provide an overview of the entire SRS. It should contain the following subsections: 1. Purpose; 2. Scope; 3. Definitions, acronyms, and abbreviations; 4. References; 5. Overview."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_040ca4c714505dfa",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should 1. Delineate the purpose of the SRS; 2. Specify the intended audience for the SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_95ff855d1d39f289",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.1.1",
        "heading": "Purpose (1.1 of the SRS)",
        "body": "This subsection should 1. Delineate the purpose of the SRS; 2. Specify the intended audience for the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_109e90d4e503874e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should 1. Identify the software product(s) to be produced by name (e.g., Host DBMS, Report Generator, etc.); 2. Explain what the software product(s) will, and, if necessary, will not do; 3. Describe the application of the software being specified, including relevant benefits, objectives, and goals; 4. Be consistent with similar statements in higher-level specifications (e.g., the system requirements specification), if they exist.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_d4254eb0e9b42e92",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.1.2",
        "heading": "Scope (1.2 of the SRS)",
        "body": "This subsection should 1. Identify the software product(s) to be produced by name (e.g., Host DBMS, Report Generator, etc.); 2. Explain what the software product(s) will, and, if necessary, will not do; 3. Describe the application of the software being specified, including relevant benefits, objectives, and goals; 4. Be consistent with similar statements in higher-level specifications (e.g., the system requirements specification), if they exist."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e823d6cd41f9c3c8",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should provide the definitions of all terms, acronyms, and abbreviations required to properly interpret the SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_7fb37ee2df147072",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.1.3",
        "heading": "Deinitions, acronyms, and abbreviations (1.3 of the SRS)",
        "body": "This subsection should provide the definitions of all terms, acronyms, and abbreviations required to properly interpret the SRS. This information may be provided by reference to one or more appendixes in the SRS or by reference to other documents."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e6efcc47e5f3ea7f",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should 1. Provide a complete list of all documents referenced elsewhere in the SRS; 2. Identify each document by title, report number (if applicable), date, and publishing organization; 3. Specify the sources from which the references can be obtained.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_fb470745b2b26875",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.1.4",
        "heading": "References (1.4 of the SRS)",
        "body": "This subsection should 1. Provide a complete list of all documents referenced elsewhere in the SRS; 2. Identify each document by title, report number (if applicable), date, and publishing organization; 3. Specify the sources from which the references can be obtained. This information may be provided by reference to an appendix or to another document."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_139463f4a02a320a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should 1. Describe what the rest of the SRS contains; 2. Explain how the SRS is organized.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_13fe8becb5c57614",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.1.5",
        "heading": "Overview (1.5 of the SRS)",
        "body": "This subsection should 1. Describe what the rest of the SRS contains; 2. Explain how the SRS is organized."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6a8bc15adbdd770a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This section of the SRS should describe the general factors that affect the product and its requirements.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_40bbd62444012ce0",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2",
        "heading": "Overall description (Section 2 of the SRS)",
        "body": "This section of the SRS should describe the general factors that affect the product and its requirements. This section does not state specific requirements. Instead, it provides a background for those requirements, which are defined in detail in Section 3 of the SRS, and makes them easier to understand. This section usually consists of six subsections, as follows: 1. Product perspective; 2. Product functions; 3. User characteristics; 4. Constraints; 5. Assumptions and dependencies; 6. Apportioning of requirements."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_40cbbcff3146ba38",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection of the SRS should put the product into perspective with other related products.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_8dca928904f8376b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "If the product is independent and totally self-contained, it should be so stated here.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c10c67f40e65c4f9",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "then this subsection should relate the requirements of that larger system to functionality of the software and should identify interfaces between that system and the software.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_104ab2a1440f42b1",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection should also describe how the software operates inside various constraints.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_f580988c0d41789b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1",
        "heading": "Product perspective (2.1 of the SRS)",
        "body": "This subsection of the SRS should put the product into perspective with other related products. If the product is independent and totally self-contained, it should be so stated here. If the SRS defines a product that is a component of a larger system, as frequently occurs, then this subsection should relate the requirements of that larger system to functionality of the software and should identify interfaces between that system and the software. A block diagram showing the major components of the larger system, interconnections, and external inter-faces can be helpful. This subsection should also describe how the software operates inside various constraints. For example, these constraints could include 1. System interfaces; 2. User interfaces; 3. Hardware interfaces; 4. Software interfaces; 5. Communications interfaces; 6. Memory; 7. Operations; 8. Site adaptation requirements."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_8f4dc916623979f7",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should list each system interface and identify the functionality of the software to accomplish the system requirement and the interface description to match the system.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_1634cb0eb59df44b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.1",
        "heading": "System interfaces",
        "body": "This should list each system interface and identify the functionality of the software to accomplish the system requirement and the interface description to match the system."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_f22d3b4bdb4586e0",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the following: 1. The logical characteristics oj each interjace between the sojtware product and its users. This includes those configuration characteristics (e.g., required screen formats, page or window layouts, content of any reports or menus, or availability of programmable function keys) necessary to accom-plish the software requirements. 2. All the aspects oj optimizing the interjace with the person who must use the system.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b78afb067297ee3b",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "the person who must use the system.",
        "modality": "must"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_08b284c4f1b5d828",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "these requirements should be verifiable",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_2663b7bda3063e1a",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.2",
        "heading": "User interfaces",
        "body": "This should specify the following: 1. The logical characteristics oj each interjace between the sojtware product and its users. This includes those configuration characteristics (e.g., required screen formats, page or window layouts, content of any reports or menus, or availability of programmable function keys) necessary to accom-plish the software requirements. 2. All the aspects oj optimizing the interjace with the person who must use the system. This may simply comprise a list of do's and don'ts on how the system will appear to the user. One example may be a requirement for the option of long or short error messages. Like all others, these requirements should be verifiable, e.g., \"a clerk typist grade 4 can do function X in Z min after 1 h of training\" rather than \"a typist can do function X.\" (This may also be specified in the Software System Attributes under a section titled Ease of Use.)"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_45e9c154dde7a117",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the logical characteristics of each interface between the software product and the hard-ware components of the system.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_643ac4283abef91b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.3",
        "heading": "Hardware interfaces",
        "body": "This should specify the logical characteristics of each interface between the software product and the hard-ware components of the system. This includes configuration characteristics (number of ports, instruction sets, etc.). It also covers such matters as what devices are to be supported, how they are to be supported, and protocols. For example, terminal support may specify full-screen support as opposed to line-by-line support."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2996326855e6cbda",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the use of other required software products (e.g., a data management system, an operat-ing system, or a mathematical package), and interfaces with other application systems (e.g., the linkage between an accounts receivable system and a general ledger system).",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_ae58179ac4e3a5e4",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "For each required software product, the following should be provided: - Name; - Mnemonic; - Specification number; - Version number; - Source.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_360ce4ca1492e2e4",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "For each interface, the following should be provided: - Discussion of the purpose of the interfacing software as related to this software product. - Definition of the interface in terms of message content and format.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_ba12159a5dacb2dd",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "a reference to the document defining the interface is required.",
        "modality": "required"
      }
    },
    {
      "data": {
        "id": "Section_af0e91f2b7da974b",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.4",
        "heading": "Software interfaces",
        "body": "This should specify the use of other required software products (e.g., a data management system, an operat-ing system, or a mathematical package), and interfaces with other application systems (e.g., the linkage between an accounts receivable system and a general ledger system). For each required software product, the following should be provided: - Name; - Mnemonic; - Specification number; - Version number; - Source. For each interface, the following should be provided: - Discussion of the purpose of the interfacing software as related to this software product. - Definition of the interface in terms of message content and format. It is not necessary to detail any well-documented interface, but a reference to the document defining the interface is required."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_1426f7c5626e6ab1",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the various interfaces to communications such as local network protocols, etc.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_bb213a56cd6be623",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.5",
        "heading": "Communications interfaces",
        "body": "This should specify the various interfaces to communications such as local network protocols, etc."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_a7d5d7f447a8b255",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify any applicable characteristics and limits on primary and secondary memory.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_d067ef3f0659fdf8",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.6",
        "heading": "Memory constraints",
        "body": "This should specify any applicable characteristics and limits on primary and secondary memory."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c60da7a014000f3e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should specify the normal and special operations required by the user such as 1. The various modes of operations in the user organization (e.g., user-initiated operations); 2. Periods of interactive operations and periods of unattended operations; 3. Data processing support functions; 4. Backup and recovery operations.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_f8334417d457897c",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.7",
        "heading": "Operations",
        "body": "This should specify the normal and special operations required by the user such as 1. The various modes of operations in the user organization (e.g., user-initiated operations); 2. Periods of interactive operations and periods of unattended operations; 3. Data processing support functions; 4. Backup and recovery operations. NOTE-This is sometimes specified as part of the User Interfaces section."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c6a5f9f4ab73a6a5",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should 1. Define the requirements for any data or initialization sequences that are specific to a given site, mission, or operational mode (e.g., grid values, safety limits, etc.); 2. Specify the site or mission-related features that should be modified to adapt the software to a partic-ular installation.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_b17fbdbceae2aba2",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.1.8",
        "heading": "Site adaptation requirements",
        "body": "This should 1. Define the requirements for any data or initialization sequences that are specific to a given site, mission, or operational mode (e.g., grid values, safety limits, etc.); 2. Specify the site or mission-related features that should be modified to adapt the software to a partic-ular installation."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_924c88c1a85e4e12",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection of the SRS should provide a summary of the major functions that the software will perform.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_6b2dda3b29a9d9e5",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "The functions should be organized in a way that makes the list of functions understandable to the customer or to anyone else reading the document for the first time.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_5c6d99aed2697917",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.2",
        "heading": "Product functions (2.2 of the SRS)",
        "body": "This subsection of the SRS should provide a summary of the major functions that the software will perform. For example, an SRS for an accounting program may use this part to address customer account maintenance, customer statement, and invoice preparation without mentioning the vast amount of detail that each of those functions requires. Sometimes the function summary that is necessary for this part can be taken directly from the section of the higher-level specification (if one exists) that allocates particular functions to the software product. Note that for the sake of clarity 1. The functions should be organized in a way that makes the list of functions understandable to the customer or to anyone else reading the document for the first time. 2. Textual or graphical methods can be used to show the different functions and their relationships. Such a diagram is not intended to show a design of a product, but simply shows the logical relation-ships among variables."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_f5136e483ea89d3c",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection of the SRS should describe those general characteristics of the intended users of the product including educational level, experience, and technical expertise.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_c7cc5db7e8d30955",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It should not be used to state specific requirements, but rather should provide the reasons why certain specific requirements are later specified in Section 3 of the SRS.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "Section_574c22050b8d223e",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.3",
        "heading": "User characteristics (2.3 of the SRS)",
        "body": "This subsection of the SRS should describe those general characteristics of the intended users of the product including educational level, experience, and technical expertise. It should not be used to state specific requirements, but rather should provide the reasons why certain specific requirements are later specified in Section 3 of the SRS."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_0f94afb847f0cc25",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection of the SRS should provide a general description of any other items that will limit the devel-oper's options.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_19e5e831555081a6",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.4",
        "heading": "Constraints (2.4 of the SRS)",
        "body": "This subsection of the SRS should provide a general description of any other items that will limit the devel-oper's options. These include 1. Regulatory policies; 2. Hardware limitations (e.g., signal timing requirements); 3. Interfaces to other applications; 4. Parallel operation; 5. Audit functions; 6. Control functions; 7. Higher-order language requirements; 8. Signal handshake protocols (e.g., XON-XOFF, ACK-NACK); 9. Reliability requirements; 10. Criticality of the application; 11. Safety and security considerations."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_b72d06997ee37319",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection of the SRS should list each of the factors that affect the requirements stated in the SRS.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_9c968b5e8c335100",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.5",
        "heading": "Assumptions and dependencies (2.5 of the SRS)",
        "body": "This subsection of the SRS should list each of the factors that affect the requirements stated in the SRS. These factors are not design constraints on the software but are, rather, any changes to them that can affect the requirements in the SRS. For example, an assumption may be that a specific operating system will be available on the hardware designated for the software product. If, in fact, the operating system is not avail-able, the SRS would then have to change accordingly."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_4e7ba4bb88e2b899",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This subsection of the SRS should identify requirements that may be delayed until future versions of the system.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_b6a35b3ada255cc7",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.2.6",
        "heading": "Apportioning of requirements (2.6 of the SRS)",
        "body": "This subsection of the SRS should identify requirements that may be delayed until future versions of the system."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_d7830c66f6f44bc7",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This section of the SRS should contain all of the software requirements to a level of detail sufficient to enable designers to design a system to satisfy those requirements, and testers to test that the system satisfies those requirements.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_019cebdf8af3ced9",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "every stated requirement should be externally perceivable by users, operators, or other external systems.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_9ce063dbc030f528",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "These requirements should include at a minimum a description of every input (stimulus) into the system, every output (response) from the system, and all functions performed by the system in response to an input or in support of an output.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e58b60f80d789aa2",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Specific requirements should be stated in conformance with all the characteristics described in 4.3.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_55525a5dc9c72368",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Specific requirements should be cross-referenced to earlier documents that relate.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_61a808e2d973780a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "All requirements should be uniquely identifiable.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_f1a56c7e57648b96",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "Careful attention should be given to organizing the requirements to maximize readability.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "Section_3d6c8cf404df91cd",
        "label": "Section",
        "type": "entity",
        "__class__": "Section",
        "key": "5.3",
        "heading": "Specific requirements (Section 3 of the SRS)",
        "body": "This section of the SRS should contain all of the software requirements to a level of detail sufficient to enable designers to design a system to satisfy those requirements, and testers to test that the system satisfies those requirements. Throughout this section, every stated requirement should be externally perceivable by users, operators, or other external systems. These requirements should include at a minimum a description of every input (stimulus) into the system, every output (response) from the system, and all functions performed by the system in response to an input or in support of an output. As this is often the largest and most impor-tant part of the SRS, the following principles apply: 1. Specific requirements should be stated in conformance with all the characteristics described in 4.3. 2. Specific requirements should be cross-referenced to earlier documents that relate. 3. All requirements should be uniquely identifiable. 4. Careful attention should be given to organizing the requirements to maximize readability. Before examining specific ways of organizing the requirements it is helpful to understand the various items that comprise requirements as described in 5.3.1 through 5.3.7."
      }
    },
    {
      "data": {
        "id": "NormativeStatement_e62c6c8278458506",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "This should be a detailed description of all inputs into and outputs from the software system.",
        "modality": "should"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_48daeb2353bb208a",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It should complement the interface descriptions in 5.2 and should not repeat information there.",
        "modality": "should not"
      }
    },
    {
      "data": {
        "id": "NormativeStatement_2c569955b103448e",
        "label": "NormativeStatement",
        "type": "entity",
        "__class__": "NormativeStatement",
        "text": "It should include both content and format as follows: 1. Name of item; 2. Description of purpose; 3. Source of input or destination of output; 4. Valid range, accuracy, and/or tolerance; 5. Units of measure; 6. Timing; 7. Relationships to other inputs/outputs; 8. Screen formats/organization; 9. Window formats/organization; 10. Data formats; 11. Command formats; 12. End messages.",
        "modality": "should"
      }
    },
    {
      "data": {
